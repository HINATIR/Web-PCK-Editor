    Web PCK Editor
  
    PCKファイル（Minecraft用フォーマット）をブラウザで編集するツールです。
  
    使用技術:
    - HTML5
    - CSS3
    - JavaScript (ES6+)
  
    ライセンス:
    このプロジェクトはGNU General Public License v3.0 (GPL-3.0)の下で公開されています。
    詳細はLICENSEファイルを参照してください。
  
    GitHub: https://github.com/HINATIR/Web-PCK-Editor
  
    参考資料・引用:
    - PCK-Studio (GPL-3.0 License)
        https://github.com/LCERD/PCK-Studio
        PCKファイルフォーマットと機能仕様の参考資料
        Authors: PhoenixARC, MayN-L, NessieHax, EternalModz
  
    - OMI-Filetype-Library (GPL-3.0 License)
        https://github.com/LCERD/OMI-Filetype-Library
        PCKファイルのパース仕様参考資料
        Authors: NessieHax, PhoenixARC, MayN-L, Bagietas
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB PCK Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: rgba(0, 122, 204, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: pan-y;
        }

        body.modal-open {
            overflow: hidden;
        }

        /* メニューバー */
        .menu-bar {
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            align-items: center;
            padding: 0;
            height: 35px;
            user-select: none;
            position: relative;
        }

        .mobile-menu-toggle {
            display: none;
            padding: 8px 12px;
            cursor: pointer;
            color: #cccccc;
            font-size: 18px;
            background: none;
            border: none;
            transition: background 0.2s;
        }

        .mobile-menu-toggle:hover {
            background: #3e3e42;
        }

        .menu-item {
            padding: 8px 15px;
            cursor: pointer;
            color: #cccccc;
            font-size: 13px;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: #3e3e42;
        }

        .menu-item:active {
            background: #007acc;
            color: white;
        }

        /* ファイル情報バー */
        .info-bar {
            background: #007acc;
            color: white;
            padding: 8px 15px;
            font-size: 12px;
            display: none;
            justify-content: space-between;
            align-items: center;
            min-height: 32px;
        }

        .info-bar.active {
            display: flex;
        }

        .info-left, .info-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 11px;
        }

        /* メインコンテナ */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左サイドバー（アセット一覧） */
        .sidebar {
            width: 320px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            font-weight: 600;
            font-size: 12px;
            color: #cccccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .asset-count {
            color: #858585;
            font-size: 11px;
            font-weight: normal;
        }

        .asset-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-action-button {
            padding: 12px 10px;
            border-top: 1px solid #3e3e42;
            background: #252526;
        }

        .sidebar-action-button .btn-action {
            width: 100%;
        }

        .asset-item {
            padding: 10px 15px;
            border-bottom: 1px solid #2d2d30;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }

        .asset-item:hover {
            background: #2a2d2e;
        }

        .asset-item:active {
            background: #333638;
        }

        .asset-item.selected {
            background: #094771;
        }

        .asset-item.selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #007acc;
        }

        .asset-item.crash-warning {
            background: rgba(211, 47, 47, 0.15);
            border-left: 3px solid #d32f2f;
        }

        .asset-item.crash-warning:hover {
            background: rgba(211, 47, 47, 0.25);
        }

        .asset-item.crash-warning.selected {
            background: rgba(211, 47, 47, 0.35);
        }

        .asset-delete-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #d32f2f;
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }

        .asset-item:hover .asset-delete-btn {
            opacity: 1;
        }

        .asset-delete-btn:hover {
            background: #ff5252;
        }

        .asset-filename {
            color: #d4d4d4;
            font-size: 13px;
            margin-bottom: 4px;
            word-break: break-all;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .asset-directory {
            color: #7d7d7d;
            font-size: 12px;
            opacity: 0.7;
            font-weight: 400;
        }

        .asset-file {
            color: #d4d4d4;
            font-weight: 500;
        }

        .asset-type-icon {
            font-size: 16px;
            flex-shrink: 0;
            width: 20px;
            text-align: center;
        }

        .asset-info {
            font-size: 11px;
            color: #858585;
        }

        /* ツリービュー - フォルダ */
        .asset-folder {
            margin-bottom: 0;
        }

        .asset-folder-toggle {
            width: 100%;
            padding: 8px 12px;
            background: #252526;
            border: none;
            border-bottom: 1px solid #3e3e42;
            color: #d4d4d4;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            font-family: inherit;
        }

        .asset-folder-toggle:hover {
            background: #2d2d30;
        }

        .asset-folder-toggle:active {
            background: #007acc;
        }

        .asset-folder-content {
            display: none;
            margin-left: 12px;
            border-left: 1px solid #3e3e42;
            padding-left: 0;
        }

        .asset-folder.expanded .asset-folder-content {
            display: block;
        }

        /* コンテキストメニュー */
        .context-menu {
            position: fixed;
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            z-index: 10000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            min-width: 180px;
        }

        .context-menu.hidden {
            display: none;
        }

        .context-menu-item {
            padding: 8px 12px;
            color: #d4d4d4;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .context-menu-item:hover {
            background: #2d2d30;
        }

        .context-menu-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .context-menu-item.disabled:hover {
            background: transparent;
        }

        .context-menu-divider {
            height: 1px;
            background: #3e3e42;
            margin: 4px 0;
        }

        /* 右側コンテンツエリア */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* プレビューエリア（上半分） */
        .preview-area {
            flex: 1;
            background: #1e1e1e;
            border-bottom: 1px solid #3e3e42;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            padding: 12px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            font-weight: 600;
            font-size: 12px;
            color: #cccccc;
        }

        .preview-content {
            flex: 1;
            padding: 15px;
            overflow: auto;
        }

        /* 詳細エリア（下半分） */
        .details-area {
            height: 300px;
            background: #252526;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .details-header {
            padding: 12px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            font-weight: 600;
            font-size: 12px;
            color: #cccccc;
        }

        .details-content {
            flex: 1;
            padding: 15px;
            overflow: auto;
        }

        .detail-row {
            display: flex;
            padding: 8px 0;
            font-size: 12px;
            border-bottom: 1px solid #2d2d30;
        }

        .detail-label {
            min-width: 110px;
            color: #569cd6;
            font-weight: 600;
        }

        .detail-value {
            color: #d4d4d4;
            word-break: break-all;
            flex: 1;
        }

        .properties-section {
            margin-top: 15px;
        }

        .properties-title {
            color: #569cd6;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .property-item {
            padding: 8px 0;
            font-size: 12px;
            border-bottom: 1px solid #2d2d30;
            display: grid;
            grid-template-columns: 150px 1fr 30px;
            gap: 10px;
            align-items: center;
        }

        .property-delete-btn {
            background: #d32f2f;
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
            padding: 0;
        }

        .property-delete-btn:hover {
            background: #ff5252;
        }

        .property-key {
            color: #9cdcfe;
            font-weight: 600;
        }

        .property-key-input {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #9cdcfe;
            padding: 4px 8px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: 600;
            width: 100%;
        }

        .property-key-input:focus {
            outline: none;
            border-color: #007acc;
        }

        .property-value-input {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #ce9178;
            padding: 4px 8px;
            border-radius: 2px;
            font-size: 12px;
            width: 100%;
        }

        .property-value-input:focus {
            outline: none;
            border-color: #007acc;
        }

        .asset-action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2d2d30;
        }

        .btn-asset-action {
            padding: 6px 14px;
            background: #0e639c;
            border: none;
            color: white;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .btn-asset-action:hover {
            background: #1177bb;
        }

        .btn-asset-action:active {
            background: #0d5a8f;
            transform: scale(0.98);
        }

        .btn-asset-action:disabled {
            background: #3e3e42;
            color: #858585;
            cursor: not-allowed;
        }

        .loc-entry-item {
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .loc-entry-key {
            color: #4ec9b0;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .loc-entry-values {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .loc-value-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loc-lang-label {
            min-width: 50px;
            color: #858585;
            font-size: 11px;
        }

        .loc-value-input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #cccccc;
            padding: 4px 8px;
            border-radius: 2px;
            font-size: 12px;
        }

        .loc-value-input:focus {
            outline: none;
            border-color: #007acc;
        }

        .loc-table-editable {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .loc-table-editable th {
            background: #2d2d30;
            color: #cccccc;
            padding: 8px;
            text-align: left;
            border: 1px solid #3e3e42;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .loc-table-editable td {
            padding: 4px;
            border: 1px solid #3e3e42;
        }

        .loc-table-editable .key-cell {
            color: #4ec9b0;
            font-weight: 600;
            background: #252526;
            padding: 8px;
        }

        .loc-table-editable .value-cell {
            background: #1e1e1e;
        }

        .loc-table-editable input {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            color: #cccccc;
            padding: 6px 8px;
            font-size: 12px;
        }

        .loc-table-editable input:focus {
            outline: none;
            border-color: #007acc;
            background: #2d2d30;
        }

        .loc-editor-container {
            display: flex;
            height: 100%;
            gap: 10px;
        }

        .loc-keys-panel {
            width: 300px;
            background: #252526;
            border: 1px solid #3e3e42;
            overflow-y: auto;
        }

        .loc-key-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #2d2d30;
            color: #4ec9b0;
            font-size: 12px;
            font-family: 'Consolas', monospace;
        }

        .loc-key-item:hover {
            background: #2d2d30;
        }

        .loc-key-item.selected {
            background: #094771;
            border-left: 3px solid #007acc;
        }

        .loc-detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .loc-bulk-replace {
            background: #2d2d30;
            border: 1px solid #3e3e42;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .loc-bulk-replace-title {
            color: #cccccc;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .loc-bulk-replace-input {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .loc-bulk-replace-input input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #cccccc;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 12px;
        }

        .loc-bulk-replace-input input:focus {
            outline: none;
            border-color: #007acc;
        }

        .loc-bulk-replace-btn {
            background: #0e639c;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }

        .loc-bulk-replace-btn:hover {
            background: #1177bb;
        }

        .loc-values-container {
            flex: 1;
            overflow-y: auto;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            padding: 12px;
        }

        .loc-value-edit-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .loc-lang-label-edit {
            color: #858585;
            font-size: 12px;
            font-weight: 600;
        }

        .loc-value-edit-input {
            background: #252526;
            border: 1px solid #3e3e42;
            color: #cccccc;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 12px;
            width: 100%;
        }

        .loc-value-edit-input:focus {
            outline: none;
            border-color: #007acc;
        }

        .loc-no-selection {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #858585;
            font-size: 13px;
        }

        /* プレビュー用スタイル */
        .preview-hex {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #d4d4d4;
            background: #1e1e1e;
            white-space: pre;
        }

        .empty-message {
            text-align: center;
            color: #6a737d;
            padding: 60px 20px;
            font-size: 14px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* ウェルカム画面 */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #858585;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 25px;
            opacity: 0.4;
        }

        .welcome-text {
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .welcome-hint {
            font-size: 13px;
            opacity: 0.7;
        }

        /* ファイル入力 */
        #fileInput {
            display: none;
        }

        /* スクロールバー */
        ::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #424242;
            border: 3px solid #1e1e1e;
            border-radius: 7px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4e4e4e;
        }

        /* LOCテーブルスタイル */
        .loc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            background: #1a1a1a;
        }

        .loc-table thead tr {
            background: #2a2a2a;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .loc-table th {
            border: 1px solid #444;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: #fff;
        }

        .loc-table td {
            border: 1px solid #444;
            padding: 8px;
            background: #1a1a1a;
        }

        .loc-table .key-cell {
            font-family: 'Consolas', monospace;
            color: #4FC3F7;
        }

        .loc-table .value-cell {
            color: #ddd;
        }

        .loc-stats {
            margin-top: 12px;
            color: #888;
            font-size: 11px;
        }

        /* ボタンスタイル */
        .details-header {
            padding: 12px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            font-weight: 600;
            font-size: 12px;
            color: #cccccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .details-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 6px 12px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: #005fa3;
        }

        .btn-action:active {
            background: #004578;
        }

        /* モーダルダイアログスタイル */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-dialog {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 5px;
            max-width: 500px;
            width: 90vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 12px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            font-weight: 600;
            color: #cccccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
        }

        .modal-close:hover {
            color: #ccc;
        }

        .modal-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 12px 15px;
            background: #2d2d30;
            border-top: 1px solid #3e3e42;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-primary {
            padding: 8px 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-primary:hover {
            background: #005fa3;
        }

    <script>
        // =====================================================
        // PCK パーサー
        // =====================================================

        class PckParser {
            constructor(arrayBuffer) {
                this.buffer = arrayBuffer;
                this.view = new DataView(arrayBuffer);
                this.offset = 0;
                this.assets = [];
                this.endianness = 'big';
                this.logs = [];
                this.platformInfo = '';
                this.isLittleEndian = false;
            }

            log(message, type = 'info') {
                console.log(message);
                this.logs.push({ message, type });
            }

            canRead(bytes) {
                return this.offset + bytes <= this.buffer.byteLength;
            }

            readByte() {
                if (!this.canRead(1)) throw new Error(`RangeError: offset=${this.offset}`);
                return this.view.getUint8(this.offset++);
            }

            readUint32(littleEndian = false) {
                if (!this.canRead(4)) throw new Error(`RangeError: offset=${this.offset}`);
                const value = this.view.getUint32(this.offset, littleEndian);
                this.offset += 4;
                return value;
            }

            readUint16(littleEndian = false) {
                if (!this.canRead(2)) throw new Error(`RangeError: offset=${this.offset}`);
                const value = this.view.getUint16(this.offset, littleEndian);
                this.offset += 2;
                return value;
            }

            readData(length) {
                if (!this.canRead(length)) throw new Error(`RangeError: offset=${this.offset}, length=${length}`);
                const data = new Uint8Array(this.buffer, this.offset, length);
                this.offset += length;
                return data;
            }

            parse() {
                try {
                    this.log('========================================');
                    this.log('PCK ファイル解析開始（OMI PckFileReader 準拠）');
                    this.log('========================================');
                    this.log(`ファイルサイズ: ${this.buffer.byteLength} バイト\n`);

                    if (this.buffer.byteLength < 12) {
                        throw new Error('ファイルが小さすぎます');
                    }

                    // エンディアンネス検出
                    const pckTypeBE = this.view.getUint32(0, false);
                    const pckTypeLE = this.view.getUint32(0, true);
                    
                    let littleEndian = false;
                    let pckType;
                    
                    this.log('🔍 エンディアンネス検出:');
                    this.log(`   Big Endian として読むと: ${pckTypeBE}`);
                    this.log(`   Little Endian として読むと: ${pckTypeLE}`);
                    
                    if (pckTypeBE > 0x00F00000) {
                        // 大きすぎるのでLittle Endian
                        littleEndian = true;
                        pckType = pckTypeLE;
                        this.log(`✅ Little Endian 確定`);
                    } else {
                        // 正常な値なのでBig Endian
                        littleEndian = false;
                        pckType = pckTypeBE;
                        this.log(`✅ Big Endian 確定`);
                    }

                    this.log(`📦 PCK Type: ${pckType}`);
                    
                    // プラットフォーム情報を表示
                    const platformInfo = this.getPlatformInfo(littleEndian);
                    this.log(`🎮 プラットフォーム: ${platformInfo}`);
                    this.log(`📊 エンディアン: ${littleEndian ? 'Little Endian (LE)' : 'Big Endian (BE)'}\n`);

                    if (pckType < 3 || pckType > 20) {
                        throw new Error(`PCK Type が無効: ${pckType} (有効範囲: 3-20)`);
                    }
                    
                    // プラットフォーム情報を保存
                    this.platformInfo = platformInfo;
                    this.isLittleEndian = littleEndian;
                    this.pckType = pckType;

                    // 1. プロパティルックアップテーブル読み込み
                    this.offset = 4;
                    const { propertyList, hasVersionStr } = this.readLookUpTable(littleEndian);
                    this.log(`📋 LUT読み込み完了: ${propertyList.length}個のプロパティ`);
                    if (hasVersionStr) {
                        this.log(`   ⚠️ XML_VERSION_STRING 検出`);
                    }

                    // 2. アセットエントリ読み込み
                    this.log(`\n📂 アセットエントリ読み込み開始 (offset=0x${this.offset.toString(16)})`);
                    const assetEntries = this.readAssetEntries(littleEndian);
                    this.log(`✅ ${assetEntries.length}個のアセットエントリ読み込み完了\n`);

                    // 3. アセットコンテンツ読み込み
                    this.log(`💾 アセットコンテンツ読み込み開始 (offset=0x${this.offset.toString(16)})`);
                    this.readAssetContents(assetEntries, propertyList, littleEndian);
                    
                    this.log(`\n✅ 解析完了: ${this.assets.length}個のアセット`);
                    return this.assets;
                } catch (error) {
                    this.log(`💥 PCK パース失敗: ${error.message}`, 'error');
                    console.error(error);
                    return [];
                }
            }

            readLookUpTable(littleEndian) {
                const count = this.readUint32(littleEndian);
                this.log(`   LUT エントリ数: ${count}`);
                
                const propertyList = [];
                for (let i = 0; i < count; i++) {
                    const index = this.readUint32(littleEndian);
                    const value = this.readStringWithPadding(littleEndian);
                    propertyList[index] = value;
                }
                
                // XML_VERSION_STRING チェック
                const hasVersionStr = propertyList.includes('XMLVERSION');
                if (hasVersionStr) {
                    const xmlVersion = this.readUint32(littleEndian);
                    this.log(`   XML Version: ${xmlVersion}`);
                }
                
                return { propertyList, hasVersionStr };
            }

            readAssetEntries(littleEndian) {
                const assetCount = this.readUint32(littleEndian);
                this.log(`   アセット数: ${assetCount}`);
                
                if (assetCount <= 0 || assetCount > 100000) {
                    throw new Error(`アセット数が異常: ${assetCount}`);
                }
                
                const entries = [];
                for (let i = 0; i < assetCount; i++) {
                    const assetSize = this.readUint32(littleEndian);
                    const assetType = this.readUint32(littleEndian);
                    const filename = this.readStringWithPadding(littleEndian).replace(/\\/g, '/');
                    
                    entries.push({ assetSize, assetType, filename });
                }
                
                return entries;
            }

            readAssetContents(assetEntries, propertyList, littleEndian) {
                for (let i = 0; i < assetEntries.length; i++) {
                    const entry = assetEntries[i];
                    
                    try {
                        // プロパティ読み込み
                        const propertyCount = this.readUint32(littleEndian);
                        const properties = [];
                        
                        for (let j = 0; j < propertyCount; j++) {
                            const keyIndex = this.readUint32(littleEndian);
                            const key = propertyList[keyIndex];
                            const value = this.readStringWithPadding(littleEndian);
                            properties.push({ key, value });
                        }
                        
                        // データ読み込み
                        const dataOffset = this.offset;
                        const data = this.readData(entry.assetSize);
                        
                        this.assets.push({
                            filename: entry.filename,
                            typeCode: entry.assetType,
                            dataSize: entry.assetSize,
                            dataOffset,
                            properties,
                            data
                        });
                        
                        this.log(`   ✅ [${i}] "${entry.filename}" 読み込み完了`);
                    } catch (error) {
                        this.log(`   ❌ [${i}] "${entry.filename}" 読み込み失敗: ${error.message}`, 'error');
                    }
                }
            }

            readStringWithPadding(littleEndian) {
                const len = this.readUint32(littleEndian);
                if (len < 0 || len > 100000) {
                    throw new Error(`文字列長が異常: ${len}`);
                }
                
                const str = this.readStringUTF16(len, littleEndian);
                this.readUint32(littleEndian); // padding
                return str;
            }

            getPlatformInfo(isLittleEndian) {
                if (isLittleEndian) {
                    return 'PS4 / PSVita / Switch';
                } else {
                    return 'PS3 / WiiU';
                }
            }

            readStringUTF16(lengthInChars, littleEndian = false) {
                const byteLength = lengthInChars * 2;
                if (!this.canRead(byteLength)) {
                    throw new Error(`UTF-16 文字列読み込み失敗`);
                }

                let decoded = '';
                for (let i = 0; i < lengthInChars; i++) {
                    const byte1 = this.view.getUint8(this.offset + i * 2);
                    const byte2 = this.view.getUint8(this.offset + i * 2 + 1);
                    const charCode = littleEndian ? (byte2 << 8) | byte1 : (byte1 << 8) | byte2;
                    if (charCode === 0) break;
                    decoded += String.fromCharCode(charCode);
                }

                this.offset += byteLength;
                return decoded;
            }
        }

        // =====================================================
        // LOC ファイルパーサー
        // =====================================================

        class LOCParser {
            constructor(arrayBuffer) {
                this.buffer = arrayBuffer;
                this.view = new DataView(arrayBuffer);
                this.offset = 0;
            }

            readUint32(littleEndian = false) {
                const value = this.view.getUint32(this.offset, littleEndian);
                this.offset += 4;
                return value;
            }

            readUint16(littleEndian = false) {
                const value = this.view.getUint16(this.offset, littleEndian);
                this.offset += 2;
                return value;
            }

            readByte() {
                return this.view.getUint8(this.offset++);
            }

            readBoolean() {
                return this.readByte() !== 0;
            }

            readBytes(length) {
                const bytes = new Uint8Array(this.buffer, this.offset, length);
                this.offset += length;
                return bytes;
            }

            readStringUTF8() {
                const length = this.readUint16(false);
                if (length === 0) return '';
                
                const bytes = new Uint8Array(this.buffer, this.offset, length);
                this.offset += length;
                
                const decoder = new TextDecoder('utf-8');
                return decoder.decode(bytes);
            }

            parse() {
                try {
                    const loc_type = this.readUint32(false);
                    const language_count = this.readUint32(false);
                    const lookUpKey = loc_type === 2;

                    let hasUids = false;
                    let keys = null;

                    if (lookUpKey) {
                        hasUids = this.readBoolean();
                        this.offset--;
                        keys = this.readKeys();
                    }

                    const languages = [];
                    const bufferSizes = [];
                    for (let i = 0; i < language_count; i++) {
                        const language = this.readStringUTF8();
                        const bufferSize = this.readUint32(false);
                        languages.push(language);
                        bufferSizes.push(bufferSize);
                    }

                    const locData = {};
                    const versions = {};
                    const hasUidsInEntry = {};
                    for (let i = 0; i < language_count; i++) {
                        const language = languages[i];
                        const bufferSize = bufferSizes[i];
                        const entryData = this.readBytes(bufferSize);
                        
                        const entryParser = new LOCParser(entryData.buffer.slice(entryData.byteOffset, entryData.byteOffset + entryData.byteLength));
                        
                        const version = entryParser.readUint32(false);
                        versions[language] = version;
                        
                        if (version > 0) {
                            const hasUidsValue = entryParser.readBoolean();
                            hasUidsInEntry[language] = hasUidsValue;
                        }

                        const entryLanguage = entryParser.readStringUTF8();
                        const count = entryParser.readUint32(false);

                        locData[language] = {};
                        for (let j = 0; j < count; j++) {
                            const key = lookUpKey ? keys[j] : entryParser.readStringUTF8();
                            const value = entryParser.readStringUTF8();
                            locData[language][key] = value;
                        }
                    }

                    return { languages, locData, keys, versions, hasUidsInEntry, hasUids, loc_type };

                } catch (error) {
                    console.error('LOC Parse Error:', error);
                    return null;
                }
            }

            readKeys() {
                const useUniqueIds = this.readBoolean();
                const keyCount = this.readUint32(false);
                const keys = [];

                for (let i = 0; i < keyCount; i++) {
                    if (useUniqueIds) {
                        const id = this.readUint32(false);
                        keys.push(id.toString(16).toUpperCase().padStart(8, '0'));
                    } else {
                        keys.push(this.readStringUTF8());
                    }
                }

                return keys;
            }
        }

                const container = document.getElementById('appToastContainer');
                if (!container) {
                    console[type === 'error' ? 'error' : 'log'](message);
                    return;
                }

                const totalDuration = Math.max(duration, 1800 + String(message ?? '').length * 24);

                const toast = document.createElement('div');
                toast.className = `app-toast ${type}`;
                toast.textContent = String(message ?? '');
                container.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.classList.add('active');
                });

                window.setTimeout(() => {
                    toast.classList.remove('active');
                    window.setTimeout(() => {
                        toast.remove();
                    }, 180);
                }, totalDuration);
            }

            showDialog({
                title = '確認',
                message = '',
                confirmText = 'OK',
                cancelText = 'キャンセル',
                showCancel = true,
                defaultValue = '',
                placeholder = '',
                inputMode = false
            } = {}) {
                const overlay = document.getElementById('appDialogOverlay');
                const titleEl = document.getElementById('appDialogTitle');
                const messageEl = document.getElementById('appDialogMessage');
                const inputEl = document.getElementById('appDialogInput');
                const confirmBtn = document.getElementById('appDialogConfirmButton');
                const cancelBtn = document.getElementById('appDialogCancelButton');
                const closeBtn = document.getElementById('appDialogCloseButton');

                if (!overlay || !titleEl || !messageEl || !inputEl || !confirmBtn || !cancelBtn || !closeBtn) {
                    return Promise.resolve({ confirmed: false, value: null });
                }

                if (this.activeDialogResolver) {
                    this.closeDialog({ confirmed: false, value: null });
                }

                titleEl.textContent = title;
                messageEl.textContent = String(message ?? '');
                confirmBtn.textContent = confirmText;
                cancelBtn.textContent = cancelText;
                cancelBtn.style.display = showCancel ? 'inline-flex' : 'none';
                closeBtn.style.display = showCancel ? 'inline-flex' : 'none';

                inputEl.style.display = inputMode ? 'block' : 'none';
                inputEl.value = defaultValue;
                inputEl.placeholder = placeholder;

                overlay.classList.add('active');
                document.body.classList.add('modal-open');

                return new Promise((resolve) => {
                    this.activeDialogResolver = resolve;

                    overlay.onclick = (e) => {
                        if (e.target === overlay && showCancel) {
                            this.closeDialog({ confirmed: false, value: null });
                        }
                    };
                    closeBtn.onclick = () => this.closeDialog({ confirmed: false, value: null });
                    cancelBtn.onclick = () => this.closeDialog({ confirmed: false, value: null });
                    confirmBtn.onclick = () => this.closeDialog({ confirmed: true, value: inputMode ? inputEl.value : null });

                    this.activeDialogKeyHandler = (e) => {
                        if (e.key === 'Escape' && showCancel) {
                            e.preventDefault();
                            this.closeDialog({ confirmed: false, value: null });
                        }
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            this.closeDialog({ confirmed: true, value: inputMode ? inputEl.value : null });
                        }
                    };
                    document.addEventListener('keydown', this.activeDialogKeyHandler);

                    window.setTimeout(() => {
                        if (inputMode) {
                            inputEl.focus();
                            inputEl.select();
                        } else {
                            confirmBtn.focus();
                        }
                    }, 0);
                });
            }

            closeDialog(result = { confirmed: false, value: null }) {
                const overlay = document.getElementById('appDialogOverlay');
                const confirmBtn = document.getElementById('appDialogConfirmButton');
                const cancelBtn = document.getElementById('appDialogCancelButton');
                const closeBtn = document.getElementById('appDialogCloseButton');
                if (overlay) {
                    overlay.classList.remove('active');
                    overlay.onclick = null;
                }
                if (confirmBtn) confirmBtn.onclick = null;
                if (cancelBtn) cancelBtn.onclick = null;
                if (closeBtn) closeBtn.onclick = null;
                document.body.classList.remove('modal-open');
                if (this.activeDialogKeyHandler) {
                    document.removeEventListener('keydown', this.activeDialogKeyHandler);
                    this.activeDialogKeyHandler = null;
                }
                const resolver = this.activeDialogResolver;
                this.activeDialogResolver = null;
                if (resolver) {
                    resolver(result);
                }
            }

            // PCKアセットを正しくエンコード
            encodePck(assets, pckType = 3, littleEndian = false) {
                console.log('=== PCK Encode Start ===');
                console.log('Assets count:', assets.length);
                console.log('PCK Type:', pckType);
                console.log('LittleEndian:', littleEndian);
                
                // プレースホルダーを除外
                const assetsToEncode = assets.filter(asset => !asset._isPlaceholder);
                console.log('Assets to encode (excluding placeholders):', assetsToEncode.length);
                
                const chunks = [];
                
                // 1. PCK Type (4バイト)
                const typeBuffer = new ArrayBuffer(4);
                new DataView(typeBuffer).setUint32(0, pckType, littleEndian);
                chunks.push(new Uint8Array(typeBuffer));
                console.log('PCK Type written:', pckType);
                
                // 2. プロパティルックアップテーブルを構築
                const propertyMap = new Map();
                let propertyIndex = 0;
                
                assetsToEncode.forEach(asset => {
                    if (asset.properties) {
                        asset.properties.forEach(prop => {
                            if (prop.key && !propertyMap.has(prop.key)) {
                                propertyMap.set(prop.key, propertyIndex++);
                            }
                        });
                    }
                });
                
                console.log('Property map size:', propertyMap.size);
                
                // LUT count
                const lutCountBuffer = new ArrayBuffer(4);
                new DataView(lutCountBuffer).setUint32(0, propertyMap.size, littleEndian);
                chunks.push(new Uint8Array(lutCountBuffer));
                
                // LUT entries
                propertyMap.forEach((index, key) => {
                    const indexBuffer = new ArrayBuffer(4);
                    new DataView(indexBuffer).setUint32(0, index, littleEndian);
                    chunks.push(new Uint8Array(indexBuffer));
                    chunks.push(this.encodeStringWithPadding(key, littleEndian));
                });
                
                // 3. アセットエントリ
                const assetCountBuffer = new ArrayBuffer(4);
                new DataView(assetCountBuffer).setUint32(0, assetsToEncode.length, littleEndian);
                chunks.push(new Uint8Array(assetCountBuffer));
                console.log('Asset count written:', assetsToEncode.length);
                
                assetsToEncode.forEach((asset, idx) => {
                    console.log(`Asset ${idx}: ${asset.filename}, type: ${asset.typeCode}, size: ${asset.dataSize}`);
                    
                    // assetSize
                    const sizeBuffer = new ArrayBuffer(4);
                    new DataView(sizeBuffer).setUint32(0, asset.dataSize, littleEndian);
                    chunks.push(new Uint8Array(sizeBuffer));
                    
                    // assetType
                    const typeBuffer = new ArrayBuffer(4);
                    new DataView(typeBuffer).setUint32(0, asset.typeCode, littleEndian);
                    chunks.push(new Uint8Array(typeBuffer));
                    
                    // filename
                    chunks.push(this.encodeStringWithPadding(asset.filename, littleEndian));
                });
                
                // 4. アセットコンテンツ
                assetsToEncode.forEach((asset, idx) => {
                    // propertyCount
                    const propCount = asset.properties ? asset.properties.length : 0;
                    const propCountBuffer = new ArrayBuffer(4);
                    new DataView(propCountBuffer).setUint32(0, propCount, littleEndian);
                    chunks.push(new Uint8Array(propCountBuffer));
                    
                    console.log(`Asset ${idx} properties count:`, propCount);
                    
                    // properties
                    if (asset.properties) {
                        asset.properties.forEach(prop => {
                            const keyIndex = propertyMap.get(prop.key);
                            const keyIndexBuffer = new ArrayBuffer(4);
                            new DataView(keyIndexBuffer).setUint32(0, keyIndex, littleEndian);
                            chunks.push(new Uint8Array(keyIndexBuffer));
                            chunks.push(this.encodeStringWithPadding(prop.value, littleEndian));
                        });
                    }
                    
                    // data
                    chunks.push(asset.data);
                });
                
                // 全て結合
                const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
                const result = new Uint8Array(totalLength);
                let offset = 0;
                chunks.forEach(chunk => {
                    result.set(chunk, offset);
                    offset += chunk.length;
                });
                
                console.log('Total encoded size:', totalLength);
                console.log('=== PCK Encode End ===');
                
                return result.buffer;
            }
            
            encodeStringWithPadding(str, littleEndian = false) {
                const chunks = [];
                
                // length (文字数)
                const lengthBuffer = new ArrayBuffer(4);
                new DataView(lengthBuffer).setUint32(0, str.length, littleEndian);
                chunks.push(new Uint8Array(lengthBuffer));
                
                // UTF-16 string
                const strBuffer = new ArrayBuffer(str.length * 2);
                const strView = new DataView(strBuffer);
                for (let i = 0; i < str.length; i++) {
                    strView.setUint16(i * 2, str.charCodeAt(i), littleEndian);
                }
                chunks.push(new Uint8Array(strBuffer));
                
                // padding (常に0)
                const paddingBuffer = new ArrayBuffer(4);
                new DataView(paddingBuffer).setUint32(0, 0, littleEndian);
                chunks.push(new Uint8Array(paddingBuffer));
                
                const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
                const result = new Uint8Array(totalLength);
                let offset = 0;
                chunks.forEach(chunk => {
                    result.set(chunk, offset);
                    offset += chunk.length;
                });
                
                return result;
            }

            async createNewPackage() {
                const packageName = document.getElementById('newPackageName').value.trim();
                if (!packageName) {
                    this.showNotice('パック名を入力してください', 'warning');
                    return;
                }

                const packIdStr = document.getElementById('newPackagePACKID').value.trim();
                if (!packIdStr) {
                    this.showNotice('PACKIDを入力してください', 'warning');
                    return;
                }

                const packId = parseInt(packIdStr, 10);
                const MAX_PACK_ID = 0xffffff; // 16777215
                const MIN_PACK_ID = 0;

                if (isNaN(packId)) {
                    this.showNotice('PACKIDは整数である必要があります', 'warning');
                    return;
                }

                if (packId < MIN_PACK_ID || packId > MAX_PACK_ID) {
                    this.showNotice(`PACKIDは${MIN_PACK_ID}～${MAX_PACK_ID}（0x${MAX_PACK_ID.toString(16).toUpperCase()}）の範囲内である必要があります`, 'warning');
                    return;
                }

                const isLittleEndian = document.getElementById('newPackageEndianLittle').checked;

                // 新しいPCKParserを作成（空のバッファ）
                const emptyBuffer = new ArrayBuffer(1024 * 1024);
                this.parser = new PckParser(emptyBuffer);
                this.parser.isLittleEndian = isLittleEndian;
                this.parser.pckType = 8; // PCK Type 8 (一般的な形式)
                this.parser.platformInfo = this.getPlatformInfo(isLittleEndian);
                this.assets = [];

                // ファイル名。0"のアセットを追加（PACKIDプロパティ付き）
                const packIdAsset = {
                    filename: '0',
                    typeCode: 4,
                    dataSize: 0,
                    dataOffset: 0,
                    properties: [
                        { key: 'PACKID', value: packId.toString() }
                    ],
                    data: new Uint8Array(0)
                };
                this.assets.push(packIdAsset);

                // LOCファイルを作成（すべてのサポート言語を追加）
                const languages = [
                    'cs-CS', 'cs-CZ', 'da-DA', 'da-DK', 'de-DE', 'el-EL', 'el-GR', 
                    'en-EN', 'en-GB', 'es-ES', 'es-MX', 'fi-FI', 'fr-FR', 'it-IT', 
                    'ja-JP', 'ko-KR', 'la-LAS', 'nb-NO', 'nl-NL', 'no-NO', 'pl-PL', 
                    'pt-BR', 'pt-PT', 'ru-RU', 'sk-SK', 'sv-SE', 'sv-SV', 'tr-TR', 
                    'zh-CHT', 'zh-CN', 'zh-HANS', 'zh-HANT'
                ];
                const locData = {};
                languages.forEach(lang => {
                    locData[lang] = {
                        'IDS_DISPLAY_NAME': packageName
                    };
                });
                const keys = ['IDS_DISPLAY_NAME'];

                const locBuffer = this.buildLocBuffer({ languages, locData, keys });
                const locAsset = {
                    filename: 'localisation.loc',
                    typeCode: 6,
                    dataSize: locBuffer.byteLength,
                    dataOffset: 0,
                    properties: [],
                    data: new Uint8Array(locBuffer)
                };
                this.assets.push(locAsset);

                // UI更新
                this.currentFilename = `${packageName}.pck`;
                this.updateInfoBar();
                this.displayAssets();
                this.closeNewPackageDialog();

                // メニューを有効化
                document.getElementById('menuSave').style.opacity = '1';
                document.getElementById('menuSave').style.pointerEvents = 'auto';
                document.getElementById('menuClose').style.opacity = '1';
                document.getElementById('menuClose').style.pointerEvents = 'auto';

                this.showNotice(`新しいPCKパッケージを作成しました: ${packageName}`, 'success');
            }

            openFile() {
                const fileInput = document.getElementById('fileInput');
                if (!fileInput) {
                    console.error('fileInput element not found');
                    this.showNotice('エラー: ファイル入力要素が見つかりません', 'error');
                    return;
                }
                fileInput.value = '';
                console.log('Opening file dialog...');
                fileInput.click();
            }

            saveFile() {
                if (!this.parser || !this.assets.length) {
                    this.showNotice('保存するファイルがありません', 'warning');
                    return;
                }

                // エンディアン選択ダイアログを表示
                const endianLittle = document.getElementById('endianLittle');
                const endianBig = document.getElementById('endianBig');
                const filenameInput = document.getElementById('saveFilenameInput');
                const filename = this.currentFilename ? this.currentFilename.replace(/\.pck$/i, '') : 'output';
                const defaultFilename = filename.endsWith('.pck') ? filename : filename + '.pck';
                
                // 現在の設定をデフォルトとして保持
                if (this.parser.isLittleEndian) {
                    endianLittle.checked = true;
                } else {
                    endianBig.checked = true;
                }
                if (filenameInput) {
                    filenameInput.value = defaultFilename;
                    window.setTimeout(() => {
                        filenameInput.focus();
                        filenameInput.select();
                    }, 0);
                }
                
                document.getElementById('saveDialogOverlay').style.display = 'flex';
            }

            closeSaveDialog() {
                document.getElementById('saveDialogOverlay').style.display = 'none';
            }

            async confirmSave() {
                try {
                    const isLittleEndian = document.getElementById('endianLittle').checked;
                    const filenameInput = document.getElementById('saveFilenameInput');
                    
                    // デフォルトファイル名を生成
                    const filename = this.currentFilename ? this.currentFilename.replace(/\.pck$/i, '') : 'output';
                    const defaultFilename = filename.endsWith('.pck') ? filename : filename + '.pck';
                    let finalFilename = filenameInput ? filenameInput.value.trim() : defaultFilename;
                    if (!finalFilename) {
                        this.showNotice('ファイル名を入力してください', 'warning');
                        if (filenameInput) {
                            filenameInput.focus();
                        }
                        return;
                    }
                    if (!finalFilename.endsWith('.pck')) {
                        finalFilename += '.pck';
                    }
                    let shouldDownload = false;
                    
                    // showSaveFilePicker が使用可能な場合（Chrome/Edge/Safari）
                    if (window.showSaveFilePicker) {
                        try {
                            const handle = await window.showSaveFilePicker({
                                suggestedName: finalFilename,
                                types: [{
                                    description: 'PCK Files',
                                    accept: { 'application/octet-stream': ['.pck'] }
                                }]
                            });
                            
                            const writable = await handle.createWritable();
                            const buffer = this.buildPckBuffer(isLittleEndian);
                            await writable.write(buffer);
                            await writable.close();
                            
                            this.closeSaveDialog();
                            this.showNotice(`ファイルを保存しました: ${handle.name}`, 'success');
                            return;
                        } catch (err) {
                            if (err.name !== 'AbortError') {
                                this.showNotice(`ファイルの保存に失敗しました: ${err.message}`, 'error', 4000);
                            }
                            return;
                        }
                    } else {
                        shouldDownload = true;
                    }
                    
                    // ダウンロード方式でファイルを保存
                    if (shouldDownload) {
                        const buffer = this.buildPckBuffer(isLittleEndian);
                        const blob = new Blob([buffer], { type: 'application/octet-stream' });
                        const url = URL.createObjectURL(blob);
                        
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = finalFilename;
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        
                        // クリックイベントを発火（dispatchEventはFirefoxでより確実）
                        link.dispatchEvent(new MouseEvent('click', { 
                            bubbles: true,
                            cancelable: true,
                            view: window
                        }));
                        
                        // クリーンアップ
                        setTimeout(() => {
                            document.body.removeChild(link);
                            URL.revokeObjectURL(url);
                            this.closeSaveDialog();
                        }, 100);
                    }
                } catch (error) {
                    this.showNotice(`保存に失敗しました: ${error.message}`, 'error', 4000);
                }
            }

            buildPckBuffer(isLittleEndian = null) {
                const little = isLittleEndian !== null ? isLittleEndian : this.parser.isLittleEndian;
                // --- 保存直前にネストPCKアセットのdataを最新childAssetsから再エンコード ---
                this.assets.forEach(asset => {
                    if ((asset.typeCode === 5 || asset.typeCode === 8 || asset.typeCode === 11) && asset.data) {
                        // childAssetsを取得
                        const childAssets = this.parsePckAsset(asset);
                        if (childAssets && childAssets.length > 0) {
                            // オリジナルPCKタイプとエンディアンを推定
                            const originalPckType = asset.typeCode === 5 ? 3 : (asset.typeCode === 8 ? 4 : 5);
                            const originalLittleEndian = this.parser ? this.parser.littleEndian : false;
                            const updatedPckBuffer = this.encodePck(childAssets, originalPckType, originalLittleEndian);
                            asset.data = new Uint8Array(updatedPckBuffer);
                            asset.dataSize = updatedPckBuffer.byteLength;
                        }
                    }
                });

                const buffer = new ArrayBuffer(1024 * 1024 * 10);
                const view = new DataView(buffer);
                const writer = {
                    offset: 0,
                    writeUint32: function(value) {
                        view.setUint32(this.offset, value, little);
                        this.offset += 4;
                    },
                    writeString: function(str) {
                        const encoder = new TextEncoder();
                        const bytes = encoder.encode(str);
                        for (let i = 0; i < bytes.length; i++) {
                            view.setUint8(this.offset++, bytes[i]);
                        }
                    },
                    writeStringUTF16: function(str) {
                        const arr = [];
                        for (let i = 0; i < str.length; i++) {
                            const code = str.charCodeAt(i);
                            if (little) {
                                arr.push(code & 0xFF);
                                arr.push((code >> 8) & 0xFF);
                            } else {
                                arr.push((code >> 8) & 0xFF);
                                arr.push(code & 0xFF);
                            }
                        }
                        for (let i = 0; i < arr.length; i++) {
                            view.setUint8(this.offset++, arr[i]);
                        }
                    },
                    writeStringWithPadding: function(str) {
                        const len = str.length;
                        this.writeUint32(len);
                        this.writeStringUTF16(str);
                        this.writeUint32(0); // padding
                    },
                    writeBytes: function(bytes) {
                        for (let i = 0; i < bytes.length; i++) {
                            view.setUint8(this.offset++, bytes[i]);
                        }
                    }
                };

                // pckType
                writer.writeUint32(this.parser.pckType);

                // プレースホルダーを除外したアセットリスト
                const assetsToSave = this.assets.filter(asset => !asset._isPlaceholder);

                // Property Lookup Table
                const props = new Set();
                assetsToSave.forEach(asset => {
                    asset.properties?.forEach(p => props.add(p.key));
                });
                const propArray = Array.from(props);

                writer.writeUint32(propArray.length);
                propArray.forEach((prop, idx) => {
                    writer.writeUint32(idx); // index
                    writer.writeStringWithPadding(prop);
                });

                // Asset Entries
                writer.writeUint32(assetsToSave.length);
                assetsToSave.forEach(asset => {
                    writer.writeUint32(asset.dataSize);
                    writer.writeUint32(asset.typeCode);
                    writer.writeStringWithPadding(asset.filename);
                });

                // Asset Contents
                assetsToSave.forEach(asset => {
                    const propList = asset.properties || [];
                    writer.writeUint32(propList.length);
                    propList.forEach(prop => {
                        const keyIdx = propArray.indexOf(prop.key);
                        writer.writeUint32(keyIdx);
                        writer.writeStringWithPadding(String(prop.value));
                    });
                    
                    if (asset.data) {
                        writer.writeBytes(new Uint8Array(asset.data));
                    }
                });

                // バッファをトリミング
                return buffer.slice(0, writer.offset);
            }

            async closeFile() {
                if (!this.parser) return;
                
                if (await this.showConfirm('ファイルを閉じますか？', { title: 'ファイルを閉じる' })) {
                    this.parser = null;
                    this.assets = [];
                    this.selectedAsset = null;
                    this.currentFilename = '';
                    
                    document.getElementById('infoBar').classList.remove('active');
                    document.getElementById('menuSave').style.opacity = '0.5';
                    document.getElementById('menuSave').style.pointerEvents = 'none';
                    document.getElementById('menuClose').style.opacity = '0.5';
                    document.getElementById('menuClose').style.pointerEvents = 'none';
                    
                    document.getElementById('assetList').innerHTML = `
                        <div class="welcome-screen">

            handleFileSelect(file) {
                if (!file) return;

                if (!file.name.toLowerCase().endsWith('.pck')) {
                    this.showNotice('.pck ファイルを選択してください', 'warning');
                    return;
                }

                this.currentFilename = file.name;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.parsePckFile(e.target.result);
                };
                reader.onerror = () => {
                    this.showNotice('ファイル読み込みエラー', 'error');
                };
                reader.readAsArrayBuffer(file);
            }

            parsePckFile(arrayBuffer) {
                this.parser = new PckParser(arrayBuffer);
                this.assets = this.parser.parse();

                this.updateInfoBar();
                this.displayAssets();
                
                // メニュー有効化
                document.getElementById('menuSave').style.opacity = '1';
                document.getElementById('menuSave').style.pointerEvents = 'auto';
                document.getElementById('menuClose').style.opacity = '1';
                document.getElementById('menuClose').style.pointerEvents = 'auto';
            }

            updateInfoBar() {
                const infoBar = document.getElementById('infoBar');
                infoBar.classList.add('active');
                
                document.getElementById('infoFilename').textContent = this.currentFilename;
                document.getElementById('infoEndian').textContent = this.parser.isLittleEndian ? 'Little Endian' : 'Big Endian';
                document.getElementById('infoPlatform').textContent = this.parser.platformInfo;
                document.getElementById('infoAssetCount').textContent = this.assets.length;
                
                const totalSize = this.assets.reduce((sum, a) => sum + a.dataSize, 0);
                document.getElementById('infoTotalSize').textContent = this.formatSize(totalSize);
            }

            displayAssets() {
                const list = document.getElementById('assetList');
                list.innerHTML = '';
                
                // プレースホルダーを除外したアセット数を表示
                const visibleAssetCount = this.assets.filter(asset => !asset._isPlaceholder).length;
                document.getElementById('assetCountLabel').textContent = `${visibleAssetCount} アセット`;

                // ディレクトリ構造を構築
                const tree = this.buildDirectoryTree();
                this._currentTree = tree;  // 後で使用するために保存
                this.renderTree(list, tree, null, '', null);  // 最後の引数をnullで初期化
                
                // 古いイベントリスナーを削除
                if (this._rootContextMenuHandler) {
                    list.removeEventListener('contextmenu', this._rootContextMenuHandler);
                }
                
                // ルートレベル（空白エリア）の右クリックメニュー
                this._rootContextMenuHandler = (e) => {
                    // 子要素でない場合のみ（空白エリアをクリックした場合）
                    if (e.target === list) {
                        e.preventDefault();
                        this.showContextMenu(e.clientX, e.clientY, {
                            type: 'root',
                            node: { _children: this._currentTree },  // 保存されたツリーを使用
                            folderPath: '',
                            currentPckFolder: null
                        });
                    }
                };
                list.addEventListener('contextmenu', this._rootContextMenuHandler);

                // フォルダのトグル機能をセットアップ
                document.querySelectorAll('.asset-folder-toggle').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const folder = btn.closest('.asset-folder');
                        const content = folder.querySelector('.asset-folder-content');
                        folder.classList.toggle('expanded');
                        content.style.display = folder.classList.contains('expanded') ? 'block' : 'none';
                    });
                });
            }

            buildDirectoryTree() {
                const tree = {};
                
                // 重複ファイル名をカウント（プレースホルダーも含めてカウント）
                const filenameCounts = {};
                this.assets.forEach(asset => {
                    filenameCounts[asset.filename] = (filenameCounts[asset.filename] || 0) + 1;
                });
                
                // 各ファイル名の出現回数を追跡
                const filenameIndexes = {};

                // ツリー構造を構築（プレースホルダーも含む）
                this.assets.forEach((asset, index) => {
                    const duplicateNum = filenameCounts[asset.filename] > 1 
                        ? ` [#${++filenameIndexes[asset.filename] || 1}]`
                        : '';
                    
                    if (asset.filename.includes('/')) {
                        const parts = asset.filename.split('/');
                        let current = tree;
                        
                        // フォルダパスを遡走
                        for (let i = 0; i < parts.length - 1; i++) {
                            const folder = parts[i];
                            if (!current[folder]) {
                                current[folder] = { _type: 'folder', _children: {} };
                            }
                            current = current[folder]._children;
                        }
                        
                        // ファイルを追加（プレースホルダーは非表示扱い）
                        const filename = parts[parts.length - 1];
                        if (!asset._isPlaceholder) {
                            current[filename + duplicateNum] = {
                                _type: 'file',
                                _asset: asset,
                                _index: index
                            };
                        }
                    } else {
                        // ルートレベルのファイル（プレースホルダーは非表示扱い）
                        if (!asset._isPlaceholder) {
                            tree[asset.filename + duplicateNum] = {
                                _type: 'file',
                                _asset: asset,
                                _index: index
                            };
                        }
                    }
                    
                    // PCKファイルかチェックして子アセットを追加
                    if (this.isPckFile(asset)) {
                        const childAssets = this.parsePckAsset(asset);
                        if (childAssets && childAssets.length > 0) {
                            // PCKの場合は、ファイル名をフォルダとして扱う
                            const folderKey = asset.filename + duplicateNum;
                            let current = tree;
                            
                            if (asset.filename.includes('/')) {
                                const parts = asset.filename.split('/');
                                for (let i = 0; i < parts.length - 1; i++) {
                                    const folder = parts[i];
                                    if (!current[folder]) {
                                        current[folder] = { _type: 'folder', _children: {} };
                                    }
                                    current = current[folder]._children;
                                }
                                const filename = parts[parts.length - 1];
                                if (!current[filename + duplicateNum]) {
                                    current[filename + duplicateNum] = { _type: 'pck-folder', _children: {}, _asset: asset };
                                } else {
                                    // 既存のファイルノードを PCK フォルダに変換
                                    current[filename + duplicateNum]._type = 'pck-folder';
                                    current[filename + duplicateNum]._children = {};
                                    current[filename + duplicateNum]._asset = asset;
                                }
                                current = current[filename + duplicateNum]._children;
                            } else {
                                if (!tree[folderKey]) {
                                    tree[folderKey] = { _type: 'pck-folder', _children: {}, _asset: asset };
                                } else if (tree[folderKey]._type === 'file') {
                                    tree[folderKey]._type = 'pck-folder';
                                    tree[folderKey]._children = {};
                                }
                                current = tree[folderKey]._children;
                            }
                            
                            // 子アセットをツリーに追加（親PCK情報も渡す）
                            this.addChildAssetsToTree(current, childAssets, asset.filename, '', { asset: asset, index: index });
                        }
                    }
                });

                return tree;
            }

            addChildAssetsToTree(current, childAssets, parentPath, parentPathForFiles = '', parentPckInfo = null) {
                const filenameCounts = {};
                childAssets.forEach(asset => {
                    filenameCounts[asset.filename] = (filenameCounts[asset.filename] || 0) + 1;
                });
                
                const filenameIndexes = {};
                
                // 最初の呼び出しの場合、ファイル親パスをセット
                if (!parentPathForFiles) {
                    parentPathForFiles = parentPath;
                }
                
                childAssets.forEach((asset, index) => {
                    const duplicateNum = filenameCounts[asset.filename] > 1 
                        ? ` [#${++filenameIndexes[asset.filename] || 1}]`
                        : '';
                    
                    if (asset.filename.includes('/')) {
                        const parts = asset.filename.split('/');
                        let node = current;
                        let accumulatedPath = parentPathForFiles;
                        
                        for (let i = 0; i < parts.length - 1; i++) {
                            const folder = parts[i];
                            accumulatedPath = accumulatedPath + '/' + folder;
                            if (!node[folder]) {
                                // フォルダ作成時に完全なパスと親PCK情報を保持
                                node[folder] = { 
                                    _type: 'folder', 
                                    _children: {},
                                    _fullPath: accumulatedPath,
                                    _parentPckInfo: parentPckInfo
                                };
                            } else if (parentPckInfo && !node[folder]._parentPckInfo) {
                                // 既存のフォルダにも親PCK情報を設定
                                node[folder]._parentPckInfo = parentPckInfo;
                            }
                            node = node[folder]._children;
                        }
                        
                        const filename = parts[parts.length - 1];
                        // プレースホルダーでない場合のみファイルノードを追加
                        if (!asset._isPlaceholder) {
                            node[filename + duplicateNum] = {
                                _type: 'file',
                                _asset: asset,
                                _parentPath: parentPathForFiles,
                                _parentPckInfo: parentPckInfo,
                                _childIndex: index
                            };
                        }
                    } else {
                        // プレースホルダーでない場合のみファイルノードを追加
                        if (!asset._isPlaceholder) {
                            current[asset.filename + duplicateNum] = {
                                _type: 'file',
                                _asset: asset,
                                _parentPath: parentPathForFiles,
                                _parentPckInfo: parentPckInfo,
                                _childIndex: index
                            };
                        }
                    }
                    
                    // 再帰的にPCKファイルをチェック
                    if (this.isPckFile(asset)) {
                        const grandchildAssets = this.parsePckAsset(asset);

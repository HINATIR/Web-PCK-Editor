                        if (grandchildAssets && grandchildAssets.length > 0) {
                            const nodeKey = asset.filename.includes('/') 
                                ? asset.filename.split('/').pop() + duplicateNum
                                : asset.filename + duplicateNum;
                            
                            let targetNode = current;
                            if (asset.filename.includes('/')) {
                                const parts = asset.filename.split('/');
                                for (let i = 0; i < parts.length - 1; i++) {
                                    targetNode = targetNode[parts[i]]._children;
                                }
                            }
                            
                            if (targetNode[nodeKey]._type === 'file') {
                                targetNode[nodeKey]._type = 'pck-folder';
                                targetNode[nodeKey]._children = {};
                            }
                            if (!targetNode[nodeKey]._children) {
                                targetNode[nodeKey]._children = {};
                            }
                            
                            // 孫アセットには、このアセット自体をparentPckInfoとして渡す
                            const nestedPckInfo = { asset: asset, index: null };
                            const nextParentPath = parentPath + '/' + asset.filename;
                            const nextPathForFiles = parentPathForFiles + '/' + asset.filename;
                            this.addChildAssetsToTree(targetNode[nodeKey]._children, grandchildAssets, nextParentPath, nextPathForFiles, nestedPckInfo);
                        }
                    }
                });
            }

            isPckFile(asset) {
                // typeCode が 5, 8, 11 の場合は PCK ファイル
                return asset.typeCode === 5 || asset.typeCode === 8 || asset.typeCode === 11;
            }

            parsePckAsset(asset) {
                try {
                    let assetData;
                    
                    // 更新されたアセットの場合、asset.dataを使用
                    if (asset.data && asset.data.byteLength > 0) {
                        assetData = asset.data;
                    } else {
                        // 元のバッファから読み込み
                        assetData = new Uint8Array(this.parser.buffer, asset.dataOffset, asset.dataSize);
                    }
                    
                    // 新しい ArrayBuffer を作成（独立した buffer にする）
                    const newBuffer = new ArrayBuffer(assetData.byteLength);
                    new Uint8Array(newBuffer).set(assetData);
                    
                    // PCK として解析
                    const childParser = new PckParser(newBuffer);
                    const childAssets = childParser.parse();
                    
                    return childAssets;
                } catch (e) {
                    console.warn(`Failed to parse PCK asset: ${asset.filename}`, e);
                    return null;
                }
            }

            renderTree(parentElement, tree, parentNode, currentPath, currentPckFolder = null) {
                Object.keys(tree).forEach(key => {
                    const node = tree[key];
                    // PCK内のフォルダで _fullPath がある場合はそれを使用、そうでない場合は currentPath を累積
                    let nodePath;
                    let nextPckFolder = currentPckFolder;
                    
                    if (node._type === 'pck-folder') {
                        // このノードがPCK-folder の場合、次のレベルではこれが基準になる
                        nextPckFolder = key;
                    }
                    
                    if (node._fullPath !== undefined) {
                        // PCK内のフォルダで完全なパスが記録されている（フォルダ名を含む）
                        nodePath = node._fullPath + '/';
                    } else if (node._parentPath !== undefined) {
                        // PCK内のフォルダだが _fullPath がない場合（PCK直下）
                        nodePath = node._parentPath + '/' + key + '/';
                    } else {
                        // 通常のフォルダ
                        nodePath = currentPath ? currentPath + key + '/' : key + '/';
                    }
                    
                    if (node._type === 'folder' || node._type === 'pck-folder') {
                        const folderDiv = document.createElement('div');
                        folderDiv.className = 'asset-folder expanded';
                        
                        const toggleBtn = document.createElement('button');
                        toggleBtn.className = 'asset-folder-toggle';
                        const icon = node._type === 'pck-folder' ? '📦' : '📁';
                        toggleBtn.innerHTML = '▼ ' + icon + ' ' + this.escapeHtml(key);
                        toggleBtn.title = key;
                        
                        // フォルダへの右クリックメニュー
                        // PCK-folder には右クリックメニューを表示しない
                        if (node._type !== 'pck-folder') {
                            folderDiv.addEventListener('contextmenu', (e) => {
                                e.preventDefault();
                                let contextFolderPath = nodePath;
                                if (currentPckFolder !== null) {
                                    const pckRelativePath = nodePath.substring((currentPckFolder + '/').length);
                                    contextFolderPath = pckRelativePath;
                                }
                                
                                this.showContextMenu(e.clientX, e.clientY, {
                                    type: 'folder',
                                    name: key,
                                    node: node,
                                    parentNode: parentNode,
                                    folderPath: contextFolderPath,
                                    currentPckFolder: currentPckFolder,
                                    parentPckInfo: node._parentPckInfo,
                                    parent: parentElement
                                });
                            });
                        }
                        
                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'asset-folder-content';
                        contentDiv.style.display = 'block';
                        
                        folderDiv.appendChild(toggleBtn);
                        folderDiv.appendChild(contentDiv);
                        parentElement.appendChild(folderDiv);
                        
                        this.renderTree(contentDiv, node._children, node, nodePath, nextPckFolder);
                    } else {
                        // ファイル
                        const asset = node._asset;
                        const index = node._index;
                        
                        const fileDiv = document.createElement('div');
                        fileDiv.className = 'asset-item';
                        
                        // クラッシュスキン・マントのチェック
                        const MAX_SIZE = 0x7FFF;
                        const isSkinOrCape = asset.typeCode === 0 || asset.typeCode === 1;
                        if (isSkinOrCape && asset.dataSize > MAX_SIZE) {
                            fileDiv.className += ' crash-warning';
                        }
                        
                        const icon = this.getAssetTypeIcon(asset);
                        const displayName = key;
                        
                        let indexDisplay = '';
                        if (index !== undefined && index !== null) {
                            indexDisplay = `[${index}] `;
                        }
                        
                        fileDiv.innerHTML = `
                            <div class="asset-filename">
                                <span class="asset-type-icon">${icon}</span>
                                <span class="asset-file">${this.escapeHtml(displayName)}</span>
                            </div>
                            <div class="asset-info">
                                ${indexDisplay}Type ${asset.typeCode} • ${this.formatSize(asset.dataSize)}
                            </div>
                            ${index !== undefined && index !== null ? `<button class="asset-delete-btn" onclick="event.stopPropagation(); viewer.deleteAsset(${index})" title="このアセットを削除">✕</button>` : ''}
                        `;
                        
                        // ファイルへの右クリックメニュー
                        fileDiv.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            e.stopPropagation(); // 親要素への伝播を止める
                            // PCK内のファイルの場合、PCK相対パスを計算
                            let contextFolderPath = currentPath;
                            if (currentPckFolder !== null) {
                                // PCK内のファイルの場合
                                const pckRelativePath = currentPath.substring((currentPckFolder + '/').length);
                                contextFolderPath = pckRelativePath;
                            }
                            
                            this.showContextMenu(e.clientX, e.clientY, {
                                type: 'file',
                                name: key,
                                asset: asset,
                                index: index,
                                parentNode: parentNode,
                                folderPath: contextFolderPath,
                                currentPckFolder: currentPckFolder,
                                parentPckInfo: node._parentPckInfo,
                                childIndex: node._childIndex
                            });
                        });
                        
                        fileDiv.addEventListener('click', () => this.selectAsset(asset, fileDiv, index));
                        parentElement.appendChild(fileDiv);
                    }
                });
            }

            getAssetTypeIcon(asset) {
                // typeCodeで判定
                switch (asset.typeCode) {
                    case 0:
                        return '👤'; // スキン
                    case 1:
                        return '🧥'; // マント
                    case 4:
                        return '📦'; // PACKID
                    case 6:
                        return '🌐'; // LOC（言語ファイル）
                    default:
                        // その他はファイル名で判定
                        const filename = asset.filename.toLowerCase();
                        if (filename.endsWith('.json')) {
                            return '📋';
                        }
                        if (filename.endsWith('.png')) {
                            return '🖼️';
                        }
                        return '📄';
                }
            }

            selectAsset(asset, element, index) {
            this.selectedAsset = asset;
            this.selectedAssetIndex = index;
            this.currentAsset = asset; // 3Dプレビュー用にcurrentAssetも必ずセット

                // モバイルでサイドバーを閉じる
                if (window.innerWidth <= 768) {
                    this.closeSidebar();
                }

                document.querySelectorAll('.asset-item').forEach(item => {
                    item.classList.remove('selected');
                });
                element.classList.add('selected');

                this.displayPreview(asset);
                this.displayDetails(asset);
            }

            displayPreview(asset) {
                                // 3Dプレビュー用にcurrentAssetも必ずセット
                                this.currentAsset = asset;
                const header = document.getElementById('previewHeader');
                const content = document.getElementById('previewContent');
                this.stopSkin3DAnimation('asset');

                let indexText = '';
                if (this.selectedAssetIndex !== undefined) {
                    indexText = `[${this.selectedAssetIndex}] `;
                } else {
                    const foundIndex = this.assets.indexOf(asset);
                    if (foundIndex !== -1) {
                        indexText = `[${foundIndex}] `;
                    }
                }
                const isImageAsset = /\.(png|jpg|jpeg|gif|bmp)$/i.test(asset.filename);
                const showSkinControls = isImageAsset && this.isSkinAsset(asset);
                header.innerHTML = `プレビュー - ${indexText}${asset.filename}` +
                    (showSkinControls
                        ? `<span style="margin-left:16px;font-size:12px;">
                            <label><input type="checkbox" id="firstLayerToggle" ${this.showFirstLayer ? 'checked' : ''} style="vertical-align:middle;">ファーストレイヤー</label>
                            <label style="margin-left:8px;"><input type="checkbox" id="secondLayerToggle" ${this.showSecondLayer ? 'checked' : ''} style="vertical-align:middle;">セカンドレイヤー</label>
                            <label style="margin-left:8px;"><input type="checkbox" id="capeLayerToggle" ${this.showCapeLayer ? 'checked' : ''} style="vertical-align:middle;">マント</label>
                            <label style="margin-left:8px;"><input type="checkbox" id="customBoxToggle" ${this.showCustomBoxes ? 'checked' : ''} style="vertical-align:middle;">追加BOX</label>
                        </span>`
                        : '');
                if (showSkinControls) {
                    setTimeout(() => {
                        const first = document.getElementById('firstLayerToggle');
                        const second = document.getElementById('secondLayerToggle');
                        const cape = document.getElementById('capeLayerToggle');
                        const customBox = document.getElementById('customBoxToggle');
                        if (first) first.onchange = (e) => { this.showFirstLayer = e.target.checked; this.displayPreview(asset); };
                        if (second) second.onchange = (e) => { this.showSecondLayer = e.target.checked; this.displayPreview(asset); };
                        if (cape) cape.onchange = (e) => { this.showCapeLayer = e.target.checked; this.displayPreview(asset); };
                        if (customBox) customBox.onchange = (e) => { this.showCustomBoxes = e.target.checked; this.displayPreview(asset); };
                    }, 0);
                }

                if (asset.dataSize === 0) {
                    content.innerHTML = '<div class="empty-message"><div class="empty-icon">📭</div>データなし</div>';
                    return;
                }

                // .loc ファイルの特別処理
                if (asset.filename.toLowerCase().endsWith('.loc')) {
                    this.displayLocPreview(asset, content);
                    return;
                }

                // 画像ファイルのプレビュー
                if (asset.filename.toLowerCase().match(/\.(png|jpg|jpeg|gif|bmp)$/)) {
                    this.displayImagePreview(asset, content);
                    return;
                }

                // HEX プレビュー
                const data = asset.data || new Uint8Array(this.parser.buffer, asset.dataOffset, Math.min(512, asset.dataSize));
                let hex = '';
                for (let i = 0; i < Math.min(512, data.length); i += 16) {
                    const chunk = Array.from(data.slice(i, i + 16))
                        .map(b => b.toString(16).padStart(2, '0'))
                        .join(' ');
                    const ascii = Array.from(data.slice(i, i + 16))
                        .map(b => b >= 32 && b < 127 ? String.fromCharCode(b) : '.')
                        .join('');
                    hex += `${(asset.dataOffset + i).toString(16).padStart(8, '0')}  ${chunk.padEnd(48)}  ${ascii}\n`;
                }

                content.innerHTML = `<div class="preview-hex">${hex}</div>`;
            }

            displayLocPreview(asset, container) {
                try {
                    const locData = asset.data || new Uint8Array(this.parser.buffer, asset.dataOffset, asset.dataSize);
                    const locParser = new LOCParser(locData.buffer.slice(locData.byteOffset, locData.byteOffset + locData.byteLength));
                    const result = locParser.parse();

                    if (!result) {
                        container.innerHTML = '<div class="empty-message"><div class="empty-icon">❌</div>LOCファイルの解析に失敗しました</div>';
                        return;
                    }

                    // LOCデータを保存
                    this.currentLocData = result;
                    this.selectedLocKey = null;
                    const { languages, locData: entries } = result;
                    
                    console.log('=== LOC Display ===');
                    console.log('言語数:', languages.length);
                    console.log('言語リスト:', languages);
                    console.log('locDataの言語:', Object.keys(entries));

                    const allKeys = new Set();
                    Object.values(entries).forEach(langEntries => {
                        Object.keys(langEntries).forEach(key => allKeys.add(key));
                    });
                    // アセット一覧の順序を保持（ソートしない）
                    const keyList = Array.from(allKeys);

                    let html = '<div class="loc-editor-container">';
                    
                    // 左側: キーリスト
                    html += '<div class="loc-keys-panel">';
                    keyList.forEach(key => {
                        // data属性でキーを渡す
                        html += `<div class="loc-key-item" data-loc-key="${this.escapeAttr(key)}" onclick="viewer.selectLocKeyFromElement(this)">
                            ${this.escapeHtml(key)}
                        </div>`;
                    });
                    html += '</div>';
                    
                    // 右側: 詳細パネル
                    html += '<div class="loc-detail-panel">';
                    html += '<div class="loc-no-selection">← 左側からキーを選択してください</div>';
                    html += '</div>';
                    
                    html += '</div>';
                    
                    container.innerHTML = html;
                } catch (error) {
                    console.error('LOC Preview Error:', error);
                    container.innerHTML = `<div class="empty-message"><div class="empty-icon">❌</div>LOC解析エラー: ${error.message}</div>`;
                }
            }

            selectLocKeyFromElement(element) {
                // data属性からキーを取得
                const key = element.dataset.locKey;
                this.selectLocKey(key);
            }

            selectLocKey(key) {
                if (!this.currentLocData) return;
                
                this.selectedLocKey = key;
                const { languages, locData: entries } = this.currentLocData;
                
                console.log('selectLocKey:', key);
                console.log('利用可能な言語:', languages);
                console.log('各言語のデータ:');
                languages.forEach(lang => {
                    console.log(`  ${lang}:`, entries[lang]?.[key]);
                });
                
                // キーアイテムのハイライト
                document.querySelectorAll('.loc-key-item').forEach(item => {
                    item.classList.remove('selected');
                    if (item.dataset.locKey === key) {
                        item.classList.add('selected');
                    }
                });
                
                // 詳細パネルを更新
                const detailPanel = document.querySelector('.loc-detail-panel');
                let html = '';
                
                // 一括置換UI
                html += '<div class="loc-bulk-replace">';
                html += '<div class="loc-bulk-replace-title">✨ すべての言語に一括適用</div>';
                html += '<div class="loc-bulk-replace-input">';
                html += `<input type="text" id="locBulkReplaceInput" placeholder="すべての言語に適用するテキスト">`;
                html += `<button class="loc-bulk-replace-btn" onclick="viewer.applyBulkReplace()">一括適用</button>`;
                html += '</div>';
                html += '</div>';
                
                // 各言語の値
                html += '<div class="loc-values-container">';
                languages.forEach(lang => {
                    const value = entries[lang]?.[key] || '';
                    html += '<div class="loc-value-edit-row">';
                    html += `<div class="loc-lang-label-edit">${this.escapeHtml(lang)}</div>`;
                    html += `<input type="text" class="loc-value-edit-input" 
                                   value="${this.escapeAttr(value)}" 
                                   data-key="${this.escapeAttr(key)}" 
                                   data-lang="${this.escapeAttr(lang)}"
                                   onchange="viewer.updateLocValue(this)">`;
                    html += '</div>';
                });
                html += '</div>';
                
                detailPanel.innerHTML = html;
            }

            applyBulkReplace() {
                if (!this.currentLocData || !this.selectedLocKey) return;
                
                const bulkValue = document.getElementById('locBulkReplaceInput').value;
                const { languages } = this.currentLocData;
                
                // すべての言語に同じ値を設定
                languages.forEach(lang => {
                    if (!this.currentLocData.locData[lang]) {
                        this.currentLocData.locData[lang] = {};
                    }
                    this.currentLocData.locData[lang][this.selectedLocKey] = bulkValue;
                });
                
                // LOCバッファを再構築
                this.rebuildLocBuffer();
                
                // UIを再描画
                this.selectLocKey(this.selectedLocKey);
                
                this.showNotice(`「${this.selectedLocKey}」をすべての言語に適用しました`, 'success');
            }

            rebuildLocBuffer() {
                if (!this.currentLocData || !this.selectedAsset) return;
                
                try {
                    // keysを更新
                    const allKeys = new Set(this.currentLocData.keys);
                    Object.values(this.currentLocData.locData).forEach(langEntries => {
                        Object.keys(langEntries).forEach(key => allKeys.add(key));
                    });
                    const updatedKeys = Array.from(allKeys);
                    
                    const newBuffer = this.buildLocBuffer({
                        ...this.currentLocData,
                        keys: updatedKeys
                    });
                    this.selectedAsset.data = new Uint8Array(newBuffer);
                    this.selectedAsset.dataSize = newBuffer.byteLength;
                    
                    // 保存ボタンを有効化
                    document.getElementById('menuSave').style.opacity = '1';
                    document.getElementById('menuSave').style.pointerEvents = 'auto';
                } catch (error) {
                    console.error('LOC更新エラー:', error);
                    this.showNotice(`LOCの更新に失敗しました: ${error.message}`, 'error', 4000);
                }
            }

            displayImagePreview(asset, container) {
                try {
                    const imageData = asset.data || new Uint8Array(this.parser.buffer, asset.dataOffset, asset.dataSize);
                    
                    // Blob URL の代わりに Data URL を使用（URLの有効期限問題を避ける）
                    const dataUrl = this.createDataUrlFromBytes(imageData);

                    // 画像を読み込んでサイズを確認
                    const img = new Image();
                    img.onload = async () => {
                        if (this.isSkinAsset(asset, img)) {
                            const animInfo = this.getSkinModelForAsset(asset);
                            const capePreview = await this.loadCapePreviewForSkin(asset);
                            this.renderSkinDualPreview(container, dataUrl, img, animInfo, 'asset', capePreview);
                            return;
                        }

                        if (this.isCapeAsset(asset, img)) {
                            this.renderCapeDualPreview(container, dataUrl, img, 'asset');
                            return;
                        }

                        // 小さい画像は自動拡大（64x64のスキンなど）
                        let displayWidth = img.width;
                        let displayHeight = img.height;
                        
                        // 画像が300px未満の場合は拡大
                        if (img.width < 300 || img.height < 300) {
                            // 最低でも幅300pxになるように拡大
                            const scale = Math.max(Math.ceil(300 / img.width), Math.ceil(300 / img.height));
                            displayWidth = img.width * scale;
                            displayHeight = img.height * scale;
                        }
                        
                        container.innerHTML = `
                            <div style="text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
                                <img src="${dataUrl}" 
                                     style="width: ${displayWidth}px; height: ${displayHeight}px; max-width: 100%; height: auto; image-rendering: pixelated; border: 1px solid #3e3e42; background: repeating-conic-gradient(#2a2a2a 0% 25%, #1e1e1e 0% 50%) 50% / 20px 20px;" />
                                <div style="color: #858585; font-size: 11px;">
                                    元サイズ: ${img.width} × ${img.height} px
                                    ${displayWidth !== img.width ? ` → 拡大表示: ${displayWidth} × ${displayHeight} px` : ''}
                                </div>
                            </div>
                        `;
                    };
                    
                    img.onerror = () => {
                        container.innerHTML = '<div class="empty-message"><div class="empty-icon">🖼️</div>画像の表示に失敗しました</div>';
                    };
                    
                    img.src = dataUrl;
                } catch (error) {
                    container.innerHTML = '<div class="empty-message"><div class="empty-icon">🖼️</div>画像の表示に失敗しました</div>';
                }
            }

            isSkinAsset(asset, img = null) {
                if (asset.typeCode === 0) return true;
                const filename = asset.filename.toLowerCase();
                if (filename.includes('dlcskin') || filename.includes('/skin') || filename.startsWith('skin')) {
                    if (!img) return true;
                    return img.width === 64 && (img.height === 64 || img.height === 32);
                }
                return false;
            }

            isCapeAsset(asset, img = null) {
                if (asset.typeCode === 1) return true;
                const filename = asset.filename.toLowerCase();
                if (filename.includes('cape') || filename.includes('elytra')) {
                    if (!img) return true;
                    return img.width >= 64 && img.height >= 32;
                }
                return false;
            }

            getSkinModelFromAnim(animValue) {
                return this.getSkinAnimInfoFromAnim(animValue).modelType;
            }

            getSkinModelForAsset(asset) {
                const animValue = asset.properties?.find(p => p.key === 'ANIM')?.value;
                return this.getSkinAnimInfoFromAnim(animValue);
            }

            normalizeAssetPath(path) {
                return String(path || '').replace(/\\/g, '/').replace(/^\.\//, '').toLowerCase();
            }

            getAssetDirectory(path) {
                const normalized = String(path || '').replace(/\\/g, '/');
                const lastSlash = normalized.lastIndexOf('/');
                return lastSlash === -1 ? '' : normalized.slice(0, lastSlash);
            }

            getAssetBytes(asset) {
                if (!asset) return null;
                if (asset.data && asset.data.byteLength > 0) {
                    return new Uint8Array(asset.data.buffer.slice(asset.data.byteOffset, asset.data.byteOffset + asset.data.byteLength));
                }
                if (this.parser && asset.dataSize > 0) {
                    return new Uint8Array(this.parser.buffer, asset.dataOffset, asset.dataSize);
                }
                return null;
            }

            createDataUrlFromBytes(bytes) {
                const base64 = btoa(String.fromCharCode.apply(null, bytes));
                return 'data:image/png;base64,' + base64;
            }

            findAssetByPathAnywhere(path, assets = this.assets) {
                const target = this.normalizeAssetPath(path);
                if (!target) return null;

                for (const candidate of assets) {
                    if (this.normalizeAssetPath(candidate.filename) === target) {
                        return candidate;
                    }
                    if (this.isPckFile(candidate)) {
                        const childAssets = this.parsePckAsset(candidate);
                        if (childAssets && childAssets.length > 0) {
                            const found = this.findAssetByPathAnywhere(path, childAssets);
                            if (found) return found;
                        }
                    }
                }

                return null;
            }

            resolveCapeAssetForSkin(asset) {
                const capePath = asset?.properties?.find(p => p.key === 'CAPEPATH')?.value;
                if (!capePath) return null;

                const normalizedCapePath = String(capePath).replace(/\\/g, '/');
                const assetDir = this.getAssetDirectory(asset.filename);
                const candidates = [normalizedCapePath];

                if (assetDir && !normalizedCapePath.includes('/')) {
                    candidates.push(assetDir + '/' + normalizedCapePath);
                }

                for (const candidatePath of candidates) {
                    const found = this.findAssetByPathAnywhere(candidatePath);
                    if (found) return found;
                }

                const capeBasename = normalizedCapePath.split('/').pop();
                if (!capeBasename) return null;

                const basenameMatches = [];
                const collectMatches = (searchAssets) => {
                    for (const candidate of searchAssets) {
                        const candidatePath = this.normalizeAssetPath(candidate.filename);
                        const basename = this.normalizeAssetPath(capeBasename);
                        if (candidatePath === basename || candidatePath.endsWith('/' + basename)) {
                            basenameMatches.push(candidate);
                        }
                        if (this.isPckFile(candidate)) {
                            const childAssets = this.parsePckAsset(candidate);
                            if (childAssets && childAssets.length > 0) {
                                collectMatches(childAssets);
                            }
                        }
                    }
                };

                collectMatches(this.assets);
                return basenameMatches.length === 1 ? basenameMatches[0] : null;
            }

            loadImageFromAsset(asset) {
                return new Promise((resolve) => {
                    const bytes = this.getAssetBytes(asset);
                    if (!bytes || bytes.byteLength === 0) {
                        resolve(null);
                        return;
                    }

                    const dataUrl = this.createDataUrlFromBytes(bytes);
                    const image = new Image();
                    image.onload = () => resolve({ image, dataUrl });
                    image.onerror = () => resolve(null);
                    image.src = dataUrl;
                });
            }

            async loadCapePreviewForSkin(asset) {
                const capeAsset = this.resolveCapeAssetForSkin(asset);
                if (!capeAsset) return null;
                return this.loadImageFromAsset(capeAsset);
            }

            parseAnimValue(animValue) {
                if (animValue === undefined || animValue === null) return 0;
                const text = String(animValue).trim().toLowerCase();
                if (text.startsWith('0x')) {
                    const parsedHex = parseInt(text, 16);
                    return Number.isNaN(parsedHex) ? 0 : (parsedHex >>> 0);
                }
                const parsed = parseInt(text, 10);
                return Number.isNaN(parsed) ? 0 : (parsed >>> 0);
            }

            getSkinAnimInfoFromAnim(animValue) {
                const rawValue = this.parseAnimValue(animValue);

                const FLAGS = {
                    HEAD_DISABLED: 1 << 10,
                    RIGHT_ARM_DISABLED: 1 << 11,
                    LEFT_ARM_DISABLED: 1 << 12,
                    BODY_DISABLED: 1 << 13,
                    RIGHT_LEG_DISABLED: 1 << 14,
                    LEFT_LEG_DISABLED: 1 << 15,
                    HEAD_OVERLAY_DISABLED: 1 << 16,
                    RESOLUTION_64x64: 1 << 18,
                    SLIM_MODEL: 1 << 19,
                    LEFT_ARM_OVERLAY_DISABLED: 1 << 20,
                    RIGHT_ARM_OVERLAY_DISABLED: 1 << 21,
                    LEFT_LEG_OVERLAY_DISABLED: 1 << 22,
                    RIGHT_LEG_OVERLAY_DISABLED: 1 << 23,
                    BODY_OVERLAY_DISABLED: 1 << 24
                };

                const hasFlag = (mask) => (rawValue & mask) !== 0;
                const isSlim = hasFlag(FLAGS.SLIM_MODEL);
                const isClassic64 = hasFlag(FLAGS.RESOLUTION_64x64);

                let modelType = 'other';
                let modelLabel = 'Other';
                if (isSlim) {
                    modelType = 'alex';
                    modelLabel = 'Alex';
                } else if (isClassic64) {
                    modelType = 'steve';
                    modelLabel = 'Steve';
                }

                return {
                    rawValue,
                    modelType,
                    modelLabel,
                    flags: {
                        headDisabled: hasFlag(FLAGS.HEAD_DISABLED),
                        bodyDisabled: hasFlag(FLAGS.BODY_DISABLED),
                        leftArmDisabled: hasFlag(FLAGS.LEFT_ARM_DISABLED),
                        rightArmDisabled: hasFlag(FLAGS.RIGHT_ARM_DISABLED),
                        leftLegDisabled: hasFlag(FLAGS.LEFT_LEG_DISABLED),
                        rightLegDisabled: hasFlag(FLAGS.RIGHT_LEG_DISABLED),
                        headOverlayDisabled: hasFlag(FLAGS.HEAD_OVERLAY_DISABLED),
                        bodyOverlayDisabled: hasFlag(FLAGS.BODY_OVERLAY_DISABLED),
                        leftArmOverlayDisabled: hasFlag(FLAGS.LEFT_ARM_OVERLAY_DISABLED),
                        rightArmOverlayDisabled: hasFlag(FLAGS.RIGHT_ARM_OVERLAY_DISABLED),
                        leftLegOverlayDisabled: hasFlag(FLAGS.LEFT_LEG_OVERLAY_DISABLED),
                        rightLegOverlayDisabled: hasFlag(FLAGS.RIGHT_LEG_OVERLAY_DISABLED)
                    }
                };
            }

            buildAnimInfoForModel(modelType) {
                return {
                    rawValue: modelType === 'alex' ? 0x00080000 : 0x00040000,
                    modelType,
                    modelLabel: modelType === 'alex' ? 'Alex' : 'Steve',
                    flags: {
                        headDisabled: false,
                        bodyDisabled: false,
                        leftArmDisabled: false,
                        rightArmDisabled: false,
                        leftLegDisabled: false,
                        rightLegDisabled: false,
                        headOverlayDisabled: false,
                        bodyOverlayDisabled: false,
                        leftArmOverlayDisabled: false,
                        rightArmOverlayDisabled: false,
                        leftLegOverlayDisabled: false,
                        rightLegOverlayDisabled: false
                    }
                };
            }

            renderSkinDualPreview(container, dataUrl, img, animInfo, target = 'asset', capePreview = null) {
                const canvasId = target === 'import' ? 'importSkin3dCanvas' : 'assetSkin3dCanvas';
                const modelLabel = animInfo?.modelLabel || 'Other';

                container.innerHTML = `
                    <div class="skin-dual-preview">
                        <div class="skin-preview-panel">
                            <div class="skin-preview-panel-title">展開図</div>
                            <div class="skin-layout-wrap">
                                <img src="${dataUrl}" class="skin-layout-image" alt="Skin Layout" />
                            </div>
                        </div>
                        <div class="skin-preview-panel">
                            <div class="skin-preview-panel-title">3D プレビュー</div>
                            <div class="skin-3d-wrap">
                                <canvas id="${canvasId}" class="skin-3d-canvas"></canvas>
                                <div class="skin-3d-model-label">${modelLabel} Model</div>
                            </div>
                        </div>
                    </div>
                    <div style="color: #858585; font-size: 11px; margin-top: 4px;">
                        元サイズ: ${img.width} × ${img.height} px
                        ${capePreview?.image ? ` • マント: ${capePreview.image.width} × ${capePreview.image.height} px` : ''}
                    </div>
                `;

                const canvas = document.getElementById(canvasId);
                this.startSkin3DAnimation(canvas, img, animInfo, target, capePreview?.image || null, 'skin');
            }

            renderCapeDualPreview(container, dataUrl, img, target = 'asset') {
                const canvasId = target === 'import' ? 'importSkin3dCanvas' : 'assetSkin3dCanvas';

                container.innerHTML = `
                    <div class="skin-dual-preview">
                        <div class="skin-preview-panel">
                            <div class="skin-preview-panel-title">展開図</div>
                            <div class="skin-layout-wrap">
                                <img src="${dataUrl}" class="skin-layout-image" alt="Cape Layout" />
                            </div>
                        </div>
                        <div class="skin-preview-panel">
                            <div class="skin-preview-panel-title">3D プレビュー</div>
                            <div class="skin-3d-wrap">
                                <canvas id="${canvasId}" class="skin-3d-canvas"></canvas>
                                <div class="skin-3d-model-label">Cape</div>
                            </div>
                        </div>
                    </div>
                    <div style="color: #858585; font-size: 11px; margin-top: 4px;">
                        元サイズ: ${img.width} × ${img.height} px
                    </div>
                `;

                const canvas = document.getElementById(canvasId);
                this.startSkin3DAnimation(canvas, img, null, target, img, 'cape');
            }

            stopSkin3DAnimation(target = 'asset') {
                if (target === 'import') {
                    if (this.importSkin3dCleanup) {
                        this.importSkin3dCleanup();
                        this.importSkin3dCleanup = null;
                    }
                    if (this.importSkin3dFrame) {
                        cancelAnimationFrame(this.importSkin3dFrame);
                        this.importSkin3dFrame = null;
                    }
                    return;
                }

                if (this.assetSkin3dCleanup) {
                    this.assetSkin3dCleanup();
                    this.assetSkin3dCleanup = null;
                }
                if (this.assetSkin3dFrame) {
                    cancelAnimationFrame(this.assetSkin3dFrame);
                    this.assetSkin3dFrame = null;
                }
            }

            startSkin3DAnimation(canvas, img, animInfo, target = 'asset', capeImg = null, previewMode = 'skin') {
                // カメラ状態をクラスプロパティとして保持
                if (this.angleY === undefined) this.angleY = -0.65;
                if (this.angleX === undefined) this.angleX = -0.26;
                if (this.zoom === undefined) this.zoom = 3.9;
                if (this.focusY === undefined) this.focusY = 14;

                // UV座標変換関数をグローバルに定義
                function toUvRect(x, y, w, h) {
                    // UVスケールを常に64x64基準（scaleX=1, scaleY=1）で固定
                    return [
                        Math.max(0, Math.round(x)),
                        Math.max(0, Math.round(y)),
                        Math.max(1, Math.round(w)),
                        Math.max(1, Math.round(h))
                    ];
                }
                // 3Dモデルパーツ格納配列（BOXや標準パーツをここに追加）
                let parts = [];
                // --- BOXプロパティ対応: スキンの追加BOXをパースしてpartsに追加 ---
                // asset情報を取得（targetで判別）
                let asset = null;
                if (target === 'asset' && this.currentAsset) asset = this.currentAsset;
                if (target === 'import' && this.importAsset) asset = this.importAsset;
                if (!asset) {
                    console.error('[ERROR] 3Dプレビュー用のassetがnullです。currentAsset/importAssetがセットされていません。ファイル読み込み処理・アセット選択処理を見直してください。');
                }

                // BOXプロパティを探す
                let boxProps = [];
                let offsetMap = {};
                if (asset && asset.properties) {
                    boxProps = asset.properties.filter(p => p.key === 'BOX');
                    // OFFSETプロパティを全て収集
                    asset.properties.filter(p => p.key === 'OFFSET').forEach(p => {
                        // 例: "ARM0 Y 2" → offsetMap[ARM0] = {Y:2}
                        const tokens = String(p.value).trim().split(/\s+/);
                        if (tokens.length >= 3) {
                            const part = tokens[0];
                            const axis = tokens[1].toUpperCase();
                            const val = parseFloat(tokens[2]);
                            if (!offsetMap[part]) offsetMap[part] = {};
                            offsetMap[part][axis] = val;
                        }
                    });
                }
                console.log('[DEBUG] asset:', asset);
                console.log('[DEBUG] boxProps:', boxProps);
                console.log('[DEBUG] offsetMap:', offsetMap);

                // --- UVスケール値を先に定義 ---
                const textureWidth = img.width;
                const textureHeight = img.height;
                const isLegacySkin = textureHeight * 2 === textureWidth;
                const baseTextureHeight = isLegacySkin ? 32 : 64;
                const scaleX = textureWidth / 64;
                const scaleY = textureHeight / baseTextureHeight;

                // parts生成・BOXパースは元のまま...
                function parseBoxText(boxText) {
                    console.log('[DEBUG] parseBoxText input:', boxText);
                    const tokens = boxText.trim().split(/\s+/);
                    const name = tokens[0];
                    const px = parseFloat(tokens[1]);
                    const py = parseFloat(tokens[2]);
                    const pz = parseFloat(tokens[3]);
                    const sx = parseFloat(tokens[4]);
                    const sy = parseFloat(tokens[5]);
                    const sz = parseFloat(tokens[6]);
                    const u = parseFloat(tokens[7]);
                    const v = tokens.length > 8 ? parseFloat(tokens[8]) : 0;
                    const inflate = tokens.length > 9 ? parseFloat(tokens[9]) : 0;
                    const mirrorVal = tokens.length > 10 ? (tokens[10] === '1' || tokens[10] === 'true') : false;

                    // ...toUvRectは外側で定義...

                    // HEADパーツの展開図と同じUV配置
                    // top:    [u+sx, v, sz, sx]
                    // bottom: [u+sx+sz, v, sz, sx]
                    // left:   [u+sx+sz, v+sz, sx, sz]
                    // front:  [u+sz, v+sz, sx, sz]
                    // right:  [u, v+sz, sx, sz]
                    // back:   [u+sx+sz+sx, v+sz, sx, sz]
                    // HEAD展開図の一般式（sx,sy,sz,u,vを使う）
                    const uvMap = {
                        top:    toUvRect(u+sz, v, sx, sz),
                        bottom: toUvRect(u+sz+sx, v, sx, sz),
                        left:   toUvRect(u+sz+sx, v+sz, sz, sy),
                        front:  toUvRect(u+sz, v+sz, sx, sy),
                        right:  toUvRect(u, v+sz, sz, sy),
                        back:   toUvRect(u+sz+sx+sz, v+sz, sx, sy)
                    };
                    // uvTransform初期化
                    let uvTransform = {};
                    if (mirrorVal) {
                        // C# の MirrorTexture は UV 領域の入れ替えではなく、
                        // 各面の U 方向だけを通常時と逆向きにする。
                        const swappedLeft = uvMap.right;
                        uvMap.right = uvMap.left;
                        uvMap.left = swappedLeft;
                        uvTransform.front = { flipX: false };
                        uvTransform.back = { flipX: false };
                        uvTransform.top = { flipX: false };
                        uvTransform.bottom = { flipX: false, flipY: true };
                        uvTransform.left = { flipX: false };
                        uvTransform.right = { flipX: false };
                    }
                    // デバッグ: パースしたBOX＋オフセット内容を一度だけ出力
                    setTimeout(() => {
                        if (name && name.toLowerCase().startsWith('box') || name === 'HEAD') {
                            console.log('[BOX PARSE]', {
                                name, px, py, pz, sx, sy, sz, u, v, inflate, mirrorVal,
                                offset: offsetMap[name] || null
                            });
                        }
                    }, 0);
                    // id生成
                    const torsoParts = ['HEAD', 'BODY', 'HEADWEAR', 'JACKET', 'WAIST', 'BELT', 'BODYARMOR', 'BODYARMOR0', 'BODYARMOR1'];
                    const rightArmParts = ['ARM0', 'SLEEVE0', 'ARMARMOR0'];
                    const leftArmParts = ['ARM1', 'SLEEVE1', 'ARMARMOR1'];
                    const rightLegParts = ['LEG0', 'PANTS0', 'LEGGING0', 'SOCK0', 'BOOT0'];
                    const leftLegParts = ['LEG1', 'PANTS1', 'LEGGING1', 'SOCK1', 'BOOT1'];
                    const knownPartNames = [...torsoParts, ...rightArmParts, ...leftArmParts, ...rightLegParts, ...leftLegParts];

                    let idName = name;
                    if (!knownPartNames.includes(name)) {
                        idName = name || 'custom';
                    }
                    // ...existing code...
                    // 座標初期値
                    let xVal = px;
                    let yVal = py;
                    let zVal = pz;
                    // 標準パーツ名ごとに座標補正
                    if (torsoParts.includes(name)) {
                        xVal = -px;
                        yVal = -py + 20;
                        zVal = -pz;
                    } else if (rightArmParts.includes(name)) {
                        xVal = -px + 5;
                        yVal = -py + 18;
                        zVal = -pz;
                    } else if (leftArmParts.includes(name)) {
                        xVal = -px - 5;
                        yVal = -py + 18;
                        zVal = -pz;
                    } else if (rightLegParts.includes(name)) {
                        xVal = -px + 2;
                        yVal = -py + 8;
                        zVal = -pz;
                    } else if (leftLegParts.includes(name)) {
                        xVal = -px - 2;
                        yVal = -py + 8;
                        zVal = -pz;
                    }
                    // オフセット適用
                    if (offsetMap[name]) {
                        if (offsetMap[name]['X']) xVal -= offsetMap[name]['X'];
                        if (offsetMap[name]['Y']) yVal -= offsetMap[name]['Y'];
                        if (offsetMap[name]['Z']) zVal -= offsetMap[name]['Z'];
                    }
                    xVal -= sx/2;
                    yVal -= sy/2;
                    zVal -= sz/2;
                    // セカンドレイヤー該当パーツは常にouterExpand=0.125
                    const secondLayerNames = ['HEADWEAR','JACKET','SLEEVE0','SLEEVE1','PANTS0','PANTS1','WAIST','LEGGING0','LEGGING1','SOCK0','SOCK1','BOOT0','BOOT1','ARMARMOR0','ARMARMOR1','BODYARMOR','BODYARMOR0','BODYARMOR1','BELT'];
                    return {
                        id: `box_${idName}`,
                        x: xVal,
                        y: yVal,
                        z: zVal,
                        w: sx,
                        h: sy,
                        d: sz,
                        uv: uvMap,
                        uvTransform: { bottom: { flipY: true }, ...uvTransform },
                        outerUv: secondLayerNames.includes(idName) ? uvMap : null,
                        outerExpand: secondLayerNames.includes(idName) ? 0.125 : (inflate || 0),
                        disableKey: null,
                        overlayDisableKey: null,
                        mirror: !!mirrorVal
                    };
                }

                // parts配列にBOXを追加
                if (boxProps.length > 0) {
                    boxProps.forEach(prop => {
                        // 複数行BOX対応
                        const lines = String(prop.value).split(/\r?\n/);
                        console.log('[DEBUG] BOX lines:', lines);
                        lines.forEach(line => {
                            if (!line.trim()) return;
                            const boxPart = parseBoxText(line);
                            console.log('[DEBUG] boxPart:', boxPart);
                            if (boxPart) {
                                // inflate値をBOXパーツにも反映（サイズ膨張）
                                if (boxPart.outerExpand && boxPart.outerExpand !== 0) {
                                    // inflateによる拡張処理を元に戻す（何もしない）
                                }
                                parts.push(boxPart);
                                console.log('[DEBUG] parts after push:', parts);
                            }
                        });
                    });
                }

                // --- ここで標準パーツを追加 ---

                // デバッグ: parts配列の内容を全出力（スケールズレ可視化用）
                console.log('[DEBUG] parts array:');
                parts.forEach(p => {
                    console.log('[PART]', {
                        id: p.id,
                        w: p.w, h: p.h, d: p.d,
                        x: p.x, y: p.y, z: p.z,
                        uv: p.uv
                    });
                });


                this.stopSkin3DAnimation(target);

                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                const armWidth = animInfo?.modelType === 'alex' ? 3 : 4;

                // toUvRectはここで再定義せずparseBoxText内のものを使う

                const toUvMap = (faceMap) => {
                    const result = {};
                    Object.entries(faceMap).forEach(([key, rect]) => {
                        result[key] = toUvRect(rect[0], rect[1], rect[2], rect[3]);
                    });
                    return result;
                };

                const rightArmBaseUv = {
                    top: [44, 16, armWidth, 4],
                    bottom: [44 + armWidth, 16, armWidth, 4],
                    left: [44 + armWidth, 20, 4, 12],
                    front: [44, 20, armWidth, 12],
                    right: [44 - armWidth, 20, 4, 12],
                    back: [44 + armWidth + 4, 20, armWidth, 12]
                };

                const leftArmBaseUv = isLegacySkin ? rightArmBaseUv : {
                    top: [36, 48, armWidth, 4],
                    bottom: [36 + armWidth, 48, armWidth, 4],
                    left: [36 + armWidth, 52, 4, 12],
                    front: [36, 52, armWidth, 12],
                    right: [36 - armWidth, 52, 4, 12],
                    back: [36 + armWidth + 4, 52, armWidth, 12]
                };

                const rightLegBaseUv = {
                    top: [4, 16, 4, 4],
                    bottom: [8, 16, 4, 4],
                    left: [8, 20, 4, 12],
                    front: [4, 20, 4, 12],
                    right: [0, 20, 4, 12],
                    back: [12, 20, 4, 12]
                };

                const leftLegBaseUv = isLegacySkin ? rightLegBaseUv : {
                    top: [20, 48, 4, 4],
                    bottom: [24, 48, 4, 4],
                    left: [24, 52, 4, 12],
                    front: [20, 52, 4, 12],
                    right: [16, 52, 4, 12],
                    back: [28, 52, 4, 12]
                };

                // 標準パーツ座標にもOFFSETを適用
                const applyOffset = (id, x, y, z) => {
                    // 標準レイヤー名・セカンドレイヤー名両方対応
                    const nameMap = {
                        head: 'HEAD', body: 'BODY', rightArm: 'ARM0', leftArm: 'ARM1', rightLeg: 'LEG0', leftLeg: 'LEG1',
                        jacket: 'JACKET', headwear: 'HEADWEAR', sleeve0: 'SLEEVE0', sleeve1: 'SLEEVE1', pants0: 'PANTS0', pants1: 'PANTS1'
                    };
                    const name = nameMap[id] || id;
                    let ox = x, oy = y, oz = z;
                    if (offsetMap[name]) {
                        if (offsetMap[name]['X']) ox -= offsetMap[name]['X'];
                        if (offsetMap[name]['Y']) oy -= offsetMap[name]['Y'];
                        if (offsetMap[name]['Z']) oz -= offsetMap[name]['Z'];
                    }
                    return [ox, oy, oz];
                };
                parts = parts.concat([
                    (() => { let [x, y, z] = applyOffset('head', 0, 24, 0); return {
                        id: 'head', disableKey: 'headDisabled', overlayDisableKey: 'headOverlayDisabled',
                        x, y, z, w: 8, h: 8, d: 8,
                        uv: toUvMap({
                            top: [8, 0, 8, 8], bottom: [16, 0, 8, 8], left: [16, 8, 8, 8], front: [8, 8, 8, 8], right: [0, 8, 8, 8], back: [24, 8, 8, 8]
                        }),
                        uvTransform: { bottom: { flipY: true } },
                        outerUv: toUvMap({
                            top: [40, 0, 8, 8], bottom: [48, 0, 8, 8], left: [48, 8, 8, 8], front: [40, 8, 8, 8], right: [32, 8, 8, 8], back: [56, 8, 8, 8]
                        }),
                        outerUvTransform: { bottom: { flipY: true } }, outerExpand: 0.125
                    }; })(),
                    (() => { let [x, y, z] = applyOffset('body', 0, 14, 0); return {
                        id: 'body', disableKey: 'bodyDisabled', overlayDisableKey: 'bodyOverlayDisabled',
                        x, y, z, w: 8, h: 12, d: 4,
                        uv: toUvMap({
                            top: [20, 16, 8, 4], bottom: [28, 16, 8, 4], left: [28, 20, 4, 12], front: [20, 20, 8, 12], right: [16, 20, 4, 12], back: [32, 20, 8, 12]
                        }),
                        outerUv: isLegacySkin ? null : toUvMap({
                            top: [20, 32, 8, 4], bottom: [28, 32, 8, 4], left: [28, 36, 4, 12], front: [20, 36, 8, 12], right: [16, 36, 4, 12], back: [32, 36, 8, 12]
                        }),
                        outerExpand: 0.125
                    }; })(),
                    (() => { let [x, y, z] = applyOffset('rightArm', 4 + armWidth / 2, 14, 0); return {
                        id: 'rightArm', disableKey: 'rightArmDisabled', overlayDisableKey: 'rightArmOverlayDisabled',
                        x, y, z, w: armWidth, h: 12, d: 4,
                        uv: toUvMap(rightArmBaseUv),
                        outerUv: isLegacySkin ? null : toUvMap({
                            top: [44, 32, armWidth, 4], bottom: [44 + armWidth, 32, armWidth, 4], left: [44 + armWidth, 36, 4, 12], front: [44, 36, armWidth, 12], right: [44 - armWidth, 36, 4, 12], back: [44 + armWidth + 4, 36, armWidth, 12]
                        }),
                        outerExpand: 0.125
                    }; })(),
                    (() => { let [x, y, z] = applyOffset('leftArm', -(4 + armWidth / 2), 14, 0); return {
                        id: 'leftArm', disableKey: 'leftArmDisabled', overlayDisableKey: 'leftArmOverlayDisabled',
                        x, y, z, w: armWidth, h: 12, d: 4,
                        uv: toUvMap(leftArmBaseUv),
                        outerUv: isLegacySkin ? null : toUvMap({
                            top: [52, 48, armWidth, 4], bottom: [52 + armWidth, 48, armWidth, 4], left: [52 + armWidth, 52, 4, 12], front: [52, 52, armWidth, 12], right: [52 - armWidth, 52, 4, 12], back: [52 + armWidth + 4, 52, armWidth, 12]
                        }),
                        outerExpand: 0.125
                    }; })(),
                    (() => { let [x, y, z] = applyOffset('rightLeg', 2, 2, 0); return {
                        id: 'rightLeg', disableKey: 'rightLegDisabled', overlayDisableKey: 'rightLegOverlayDisabled',
                        x, y, z, w: 4, h: 12, d: 4,
                        uv: toUvMap(rightLegBaseUv),
                        outerUv: isLegacySkin ? null : toUvMap({
                            top: [4, 32, 4, 4], bottom: [8, 32, 4, 4], left: [8, 36, 4, 12], front: [4, 36, 4, 12], right: [0, 36, 4, 12], back: [12, 36, 4, 12]
                        }),
                        outerExpand: 0.125
                    }; })(),
                    (() => { let [x, y, z] = applyOffset('leftLeg', -2, 2, 0); return {
                        id: 'leftLeg', disableKey: 'leftLegDisabled', overlayDisableKey: 'leftLegOverlayDisabled',
                        x, y, z, w: 4, h: 12, d: 4,
                        uv: toUvMap(leftLegBaseUv),
                        outerUv: isLegacySkin ? null : toUvMap({
                            top: [4, 48, 4, 4], bottom: [8, 48, 4, 4], left: [8, 52, 4, 12], front: [4, 52, 4, 12], right: [0, 52, 4, 12], back: [12, 52, 4, 12]
                        }),
                        outerExpand: 0.125
                    }; })()
                ]);

                const texCanvas = document.createElement('canvas');
                texCanvas.width = textureWidth;
                texCanvas.height = textureHeight;
                const texCtx = texCanvas.getContext('2d', { willReadFrequently: true });
                if (!texCtx) return;
                texCtx.imageSmoothingEnabled = false;
                texCtx.drawImage(img, 0, 0);
                const textureData = texCtx.getImageData(0, 0, textureWidth, textureHeight).data;

                let capeTextureData = null;
                let capeTextureWidth = 0;
                let capeTextureHeight = 0;
                if (capeImg) {
                    const capeCanvas = document.createElement('canvas');
                    capeCanvas.width = capeImg.width;
                    capeCanvas.height = capeImg.height;
                    const capeCtx = capeCanvas.getContext('2d', { willReadFrequently: true });
                    if (capeCtx) {
                        capeCtx.imageSmoothingEnabled = false;
                        capeCtx.drawImage(capeImg, 0, 0);
                        capeTextureWidth = capeImg.width;
                        capeTextureHeight = capeImg.height;
                        capeTextureData = capeCtx.getImageData(0, 0, capeTextureWidth, capeTextureHeight).data;
                    }
                }

                if (capeTextureData) {
                    const capeScaleX = capeTextureWidth / 64;
                    const capeScaleY = capeTextureHeight / 32;
                    const toCapeUvRect = (x, y, w, h) => toUvRect(x * capeScaleX, y * capeScaleY, w * capeScaleX, h * capeScaleY);

                    parts.push({
                        id: 'cape',
                        x: 0,
                        y: 12,
                        z: -3.5,
                        w: 10,
                        h: 16,
                        d: 1,
                        uv: {
                            top: toCapeUvRect(1, 0, 10, 1),
                            bottom: toCapeUvRect(11, 0, 10, 1),
                            left: toCapeUvRect(11, 1, 1, 16),
                            front: toCapeUvRect(1, 1, 10, 16),
                            right: toCapeUvRect(0, 1, 1, 16),
                            back: toCapeUvRect(12, 1, 10, 16)
                        },
                        uvTransform: { bottom: { flipY: true } },
                        textureSource: 'cape',
                        localRotateY: Math.PI,
                        localRotateX: 7.5 * Math.PI / 180
                    });
                }

                const makeVertices = (part) => {
                    const hx = part.w / 2;
                    const hy = part.h / 2;
                    const hz = part.d / 2;
                    return {
                        front: [
                            { x: -hx, y: hy, z: hz },
                            { x: hx, y: hy, z: hz },
                            { x: hx, y: -hy, z: hz },
                            { x: -hx, y: -hy, z: hz }
                        ],
                        back: [
                            { x: hx, y: hy, z: -hz },
                            { x: -hx, y: hy, z: -hz },
                            { x: -hx, y: -hy, z: -hz },
                            { x: hx, y: -hy, z: -hz }
                        ],
                        left: [
                            { x: -hx, y: hy, z: -hz },
                            { x: -hx, y: hy, z: hz },
                            { x: -hx, y: -hy, z: hz },
                            { x: -hx, y: -hy, z: -hz }
                        ],
                        right: [
                            { x: hx, y: hy, z: hz },
                            { x: hx, y: hy, z: -hz },
                            { x: hx, y: -hy, z: -hz },
                            { x: hx, y: -hy, z: hz }
                        ],
                        top: [
                            { x: -hx, y: hy, z: -hz },
                            { x: hx, y: hy, z: -hz },
                            { x: hx, y: hy, z: hz },
                            { x: -hx, y: hy, z: hz }
                        ],
                        bottom: [
                            { x: -hx, y: -hy, z: hz },
                            { x: hx, y: -hy, z: hz },
                            { x: hx, y: -hy, z: -hz },
                            { x: -hx, y: -hy, z: -hz }
                        ]
                    };
                };

                const rotateY = (v, angle) => {
                    const cos = Math.cos(angle);
                    const sin = Math.sin(angle);
                    return {
                        x: v.x * cos + v.z * sin,
                        y: v.y,
                        z: -v.x * sin + v.z * cos
                    };
                };

                const rotateX = (v, angle) => {
                    const cos = Math.cos(angle);
                    const sin = Math.sin(angle);
                    return {
                        x: v.x,
                        y: v.y * cos - v.z * sin,
                        z: v.y * sin + v.z * cos
                    };
                };

                const getTexel = (x, y) => {
                    const tx = Math.floor(x);
                    const ty = Math.floor(y);
                    if (tx < 0 || tx >= textureWidth || ty < 0 || ty >= textureHeight) return null;
                    const index = (ty * textureWidth + tx) * 4;
                    const alpha = textureData[index + 3];
                    if (alpha === 0) return null;
                    return {
                        r: textureData[index],
                        g: textureData[index + 1],
                        b: textureData[index + 2],
                        a: alpha / 255
                    };
                };

                const getCapeTexel = (x, y) => {
                    if (!capeTextureData) return null;
                    const tx = Math.floor(x);
                    const ty = Math.floor(y);
                    if (tx < 0 || tx >= capeTextureWidth || ty < 0 || ty >= capeTextureHeight) return null;
                    const index = (ty * capeTextureWidth + tx) * 4;
                    const alpha = capeTextureData[index + 3];
                    if (alpha === 0) return null;
                    return {
                        r: capeTextureData[index],
                        g: capeTextureData[index + 1],
                        b: capeTextureData[index + 2],
                        a: alpha / 255
                    };
                };

                const bilerpPoint = (quad, u, v) => {
                    const topX = quad[0].x + (quad[1].x - quad[0].x) * u;
                    const topY = quad[0].y + (quad[1].y - quad[0].y) * u;
                    const bottomX = quad[3].x + (quad[2].x - quad[3].x) * u;
                    const bottomY = quad[3].y + (quad[2].y - quad[3].y) * u;
                    return {
                        x: topX + (bottomX - topX) * v,
                        y: topY + (bottomY - topY) * v
                    };
                };

                const quadArea = (quad) => {
                    let area = 0;
                    for (let i = 0; i < quad.length; i++) {
                        const next = quad[(i + 1) % quad.length];
                        area += quad[i].x * next.y - next.x * quad[i].y;
                    }
                    return Math.abs(area) * 0.5;
                };

                const drawPixelQuad = (quad, color) => {
                    ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${color.a})`;
                    ctx.beginPath();
                    ctx.moveTo(quad[0].x, quad[0].y);
                    ctx.lineTo(quad[1].x, quad[1].y);
                    ctx.lineTo(quad[2].x, quad[2].y);
                    ctx.lineTo(quad[3].x, quad[3].y);
                    ctx.closePath();
                    ctx.fill();
                };

                const drawTexturedQuad = (uvRect, projectedQuad, uvTransform = null, textureSource = 'skin') => {
                    if (!uvRect) return;
                    const [u, v, w, h] = uvRect;
                    const overlap = 0.18;
                    const projectedArea = quadArea(projectedQuad);
                    const sampleTexel = textureSource === 'cape' ? getCapeTexel : getTexel;
                        // BOXパーツの場合はuvTransformでflipX/flipYを個別指定可能
                        const flipX = uvTransform?.flipX === undefined ? true : !!uvTransform.flipX;
                        const flipY = !!uvTransform?.flipY;
                        if (projectedArea < 1.25) {
                            const sampleX = flipX ? Math.floor((w - 1) * 0.5) : Math.floor((w - 1) * 0.5);
                            const sampleY = flipY ? Math.floor((h - 1) * 0.5) : Math.floor((h - 1) * 0.5);
                            const texel = sampleTexel(u + sampleX, v + sampleY);
                            if (texel) {
                                drawPixelQuad(projectedQuad, texel);
                            }
                            return;
                        }
                        for (let py = 0; py < h; py++) {
                            for (let px = 0; px < w; px++) {
                                const sampleX = flipX ? (w - 1 - px) : px;
                                const sampleY = flipY ? (h - 1 - py) : py;
                                const texel = sampleTexel(u + sampleX, v + sampleY);
                                if (!texel) continue;

                                const u0 = Math.max(0, (px - overlap) / w);
                                const v0 = Math.max(0, (py - overlap) / h);
                                const u1 = Math.min(1, (px + 1 + overlap) / w);
                                const v1 = Math.min(1, (py + 1 + overlap) / h);

                                const q0 = bilerpPoint(projectedQuad, u0, v0);
                                const q1 = bilerpPoint(projectedQuad, u1, v0);
                                const q2 = bilerpPoint(projectedQuad, u1, v1);
                                const q3 = bilerpPoint(projectedQuad, u0, v1);

                                drawPixelQuad([q0, q1, q2, q3], texel);
                            }
                        }
                };

                const fitCanvas = () => {
                    const dpr = window.devicePixelRatio || 1;
                    const width = Math.max(240, canvas.clientWidth || 300);
                    const height = Math.max(230, canvas.clientHeight || 260);
                    canvas.width = Math.floor(width * dpr);
                    canvas.height = Math.floor(height * dpr);
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    ctx.imageSmoothingEnabled = false;
                };

                fitCanvas();

                let angleY = -0.65;
                let angleX = -0.26;
                const cameraDistance = 90;
                const projection = 120;
                let zoom = 3.9;
                const minZoom = 2.2;
                const maxZoom = 8.0;
                // partsのy座標範囲から注視点を自動決定
                if (parts.length > 0) {
                    let minY = Infinity, maxY = -Infinity;
                    parts.forEach(p => {
                        minY = Math.min(minY, p.y - p.h/2);
                        maxY = Math.max(maxY, p.y + p.h/2);
                    });
                    this.focusY = (minY + maxY) / 2;
                }
                let dragging = false;
                let lastX = 0;
                let lastY = 0;
                let renderScheduled = false;

                const renderScene = () => {
                    renderScheduled = false;
                    if (!document.body.contains(canvas)) {
                        this.stopSkin3DAnimation(target);
                        return;
                    }

                    const width = canvas.clientWidth || 300;
                    const height = canvas.clientHeight || 260;
                    ctx.clearRect(0, 0, width, height);

                    const centerX = width / 2;
                    const centerY = height / 2 + 6;

                    const faces = [];

                    const collectLayerFaces = (part, uvMap, uvTransformMap = null, expand = 0) => {
                        if (!uvMap) return;
                        const expanded = {
                            x: part.x,
                            y: part.y,
                            z: part.z,
                            w: part.w + expand,
                            h: part.h + expand,
                            d: part.d + expand
                        };
                        let partVertices = makeVertices(expanded);
                        Object.entries(partVertices).forEach(([faceName, verts]) => {
                            setTimeout(() => {
                                if (part.id && part.id.startsWith('box_')) {
                                    console.log('[BOX DRAW]', {
                                        id: part.id,
                                        face: faceName,
                                        x: part.x, y: part.y, z: part.z, w: part.w, h: part.h, d: part.d,
                                        uv: uvMap[faceName],
                                        uvTransform: uvTransformMap ? uvTransformMap[faceName] : null
                                    });
                                }
                            }, 0);
                            let vertsToUse = verts;
                            const transformed = vertsToUse.map(v => {
                                let localVertex = v;
                                if (part.localRotateY) {
                                    localVertex = rotateY(localVertex, part.localRotateY);
                                }
                                if (part.localRotateX) {
                                    localVertex = rotateX(localVertex, part.localRotateX);
                                }
                                const withOffset = { x: localVertex.x + part.x, y: localVertex.y + part.y - this.focusY, z: localVertex.z + part.z };
                                const rotatedY = rotateY(withOffset, this.angleY);
                                const rotatedX = rotateX(rotatedY, this.angleX);
                                const z = rotatedX.z + cameraDistance;
                                const scale = projection / z;
                                return {
                                    x: centerX + rotatedX.x * scale * this.zoom,
                                    y: centerY - rotatedX.y * scale * this.zoom,
                                    z: z
                                };
                            });

                            const vA = transformed[0];
                            const vB = transformed[1];
                            const vC = transformed[2];
                            const cross = (vB.x - vA.x) * (vC.y - vA.y) - (vB.y - vA.y) * (vC.x - vA.x);
                            const projectedArea = quadArea(transformed);
                            if (cross < 0 || projectedArea < 1.25) {
                                // bottom面は必ず上下反転
                                let uvTrans = uvTransformMap ? uvTransformMap[faceName] : null;
                                if (faceName === 'bottom') {
                                    uvTrans = { ...(uvTrans || {}), flipY: true };
                                }
                                faces.push({
                                    points: transformed,
                                    uv: uvMap[faceName],
                                    uvTransform: uvTrans,
                                    textureSource: part.textureSource || 'skin',
                                    z: transformed.reduce((sum, p) => sum + p.z, 0) / 4
                                });
                            }
                        });
                    };

                    const showFirst = this.showFirstLayer !== false;
                    const showSecond = this.showSecondLayer !== false;
                    const showCape = previewMode === 'cape' ? true : this.showCapeLayer !== false;
                    const showCustomBoxes = previewMode === 'cape' ? false : this.showCustomBoxes !== false;
                    parts.forEach(part => {
                        if (previewMode === 'cape' && part.id !== 'cape') {
                            return;
                        }
                        if (part.id === 'cape') {
                            if (showCape) {
                                collectLayerFaces(part, part.uv, part.uvTransform, 0);
                            }
                            return;
                        }
                        if (part.id && part.id.startsWith('box_')) {
                            if (!showCustomBoxes) {
                                return;
                            }
                            collectLayerFaces(part, part.uv, part.uvTransform, 0);
                            // セカンドレイヤー該当BOXは必ずexpand=0.125*part.w
                            const secondLayerIds = ['box_HEADWEAR','box_JACKET','box_SLEEVE0','box_SLEEVE1','box_PANTS0','box_PANTS1','box_WAIST','box_LEGGING0','box_LEGGING1','box_SOCK0','box_SOCK1','box_BOOT0','box_BOOT1','box_ARMARMOR0','box_ARMARMOR1','box_BODYARMOR','box_BODYARMOR0','box_BODYARMOR1','box_BELT'];
                            const expand = secondLayerIds.includes(part.id) ? (0.125 * (part.w || 0)) : (part.outerExpand ? (part.outerExpand * (part.w || 0)) : 0);
                            collectLayerFaces(part, part.outerUv, part.outerUvTransform, expand);
                        } else {
                            const baseHidden = !!(animInfo?.flags && part.disableKey && animInfo.flags[part.disableKey]);
                            if (!baseHidden && showFirst) {
                                collectLayerFaces(part, part.uv, part.uvTransform, 0);
                            }
                            const overlayHiddenByAnim = !!(animInfo?.flags && part.overlayDisableKey && animInfo.flags[part.overlayDisableKey]);
                            const overlayHidden = baseHidden || isLegacySkin || overlayHiddenByAnim;
                            if (!overlayHidden && showSecond) {
                                const expand = part.outerExpand ? (part.outerExpand * (part.w || 0)) : 0;
                                collectLayerFaces(part, part.outerUv, part.outerUvTransform, expand);
                            }
                        }
                    });

                    faces.sort((a, b) => b.z - a.z);
                    faces.forEach(face => {
                        drawTexturedQuad(face.uv, face.points, face.uvTransform, face.textureSource);
                    });
                };

                const scheduleRender = () => {
                    if (renderScheduled) return;
                    renderScheduled = true;
                    const frameId = requestAnimationFrame(renderScene);
                    if (target === 'import') {
                        this.importSkin3dFrame = frameId;
                    } else {
                        this.assetSkin3dFrame = frameId;
                    }
                };

                const onPointerDown = (e) => {
                    dragging = true;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    canvas.classList.add('dragging');
                    canvas.setPointerCapture(e.pointerId);
                };

                const onPointerMove = (e) => {
                    if (!dragging) return;
                    const dx = e.clientX - lastX;
                    const dy = e.clientY - lastY;
                    lastX = e.clientX;
                    lastY = e.clientY;

                    this.angleY += dx * 0.01;
                    this.angleX += dy * 0.01;
                    this.angleX = Math.max(-1.15, Math.min(0.35, this.angleX));
                    scheduleRender();
                };

                const endDrag = (e) => {
                    if (!dragging) return;
                    dragging = false;
                    canvas.classList.remove('dragging');
                    try {
                        if (e && typeof e.pointerId === 'number') {
                            canvas.releasePointerCapture(e.pointerId);
                        }
                    } catch (_) {}
                };

                const onResize = () => {
                    fitCanvas();
                    scheduleRender();
                };

                const onWheel = (e) => {
                    e.preventDefault();
